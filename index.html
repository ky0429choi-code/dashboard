<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Samsung Welstory Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.46.0/dist/apexcharts.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --card: rgba(17, 24, 39, .85);
            --card-hover: rgba(23, 32, 52, .9);
            --border: rgba(148, 163, 184, .08);
            --border-hover: rgba(56, 189, 248, .2);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --accent3: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --text: #f1f5f9;
            --muted: #64748b;
            --dim: #475569;
            --r: 16px;
            --r2: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, .4);
            --glow: 0 0 20px rgba(56, 189, 248, .08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden
        }

        input,
        textarea,
        select,
        button {
            font-family: inherit;
            user-select: auto !important;
            -webkit-user-select: auto !important
        }

        /* ===== LOGIN ===== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000
        }

        .login-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(56, 189, 248, .06), transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(129, 140, 248, .04), transparent 50%)
        }

        .login-card {
            position: relative;
            background: linear-gradient(145deg, rgba(17, 24, 39, .9), rgba(15, 23, 42, .95));
            padding: 48px 32px 36px;
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, .06);
            width: 88%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5), var(--glow)
        }

        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 8px 24px rgba(56, 189, 248, .2)
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -.5px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .login-card p {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5
        }

        .login-field {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, .03);
            border: 1.5px solid rgba(148, 163, 184, .1);
            border-radius: 14px;
            margin-bottom: 10px;
            height: 50px;
            padding: 0 16px;
            transition: all .3s
        }

        .login-field:focus-within {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .04);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, .08)
        }

        .login-field input {
            flex: 1;
            min-width: 0;
            height: 100%;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            outline: none
        }

        .login-field input::placeholder {
            color: var(--dim);
            font-weight: 600
        }

        .domain-tag {
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            opacity: .7;
            flex-shrink: 0;
            white-space: nowrap
        }

        #loginPw {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            background: rgba(255, 255, 255, .03);
            border: 1.5px solid rgba(148, 163, 184, .1);
            border-radius: 14px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            transition: all .3s
        }

        #loginPw:focus {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .04);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, .08)
        }

        #loginPw::placeholder {
            color: var(--dim);
            font-weight: 600
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: -.3px;
            box-shadow: 0 4px 16px rgba(56, 189, 248, .25);
            transition: all .2s
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(56, 189, 248, .35)
        }

        .login-btn:disabled {
            opacity: .4;
            transform: none;
            cursor: not-allowed
        }

        #login-error {
            color: var(--danger);
            font-size: 12px;
            margin-top: 14px;
            font-weight: 700;
            display: none;
            line-height: 1.5;
            background: rgba(248, 113, 113, .06);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(248, 113, 113, .1);
            width: 100%;
            text-align: left
        }

        /* ===== SPLASH ===== */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000
        }

        .sp-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, .06);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* ===== DASHBOARD ===== */
        #dashboard {
            display: none;
            opacity: 0;
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
            transition: opacity .4s
        }

        header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(10, 15, 30, .92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px) saturate(1.2);
            padding: env(safe-area-inset-top, 12px) 20px 14px
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 8px;
            min-width: 0
        }

        .header-top>div:first-child {
            min-width: 0;
            flex: 1 1 0;
            overflow: hidden
        }

        .header-top h1 {
            font-size: clamp(12px, 3.8vw, 18px);
            font-weight: 900;
            letter-spacing: -.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #lastUpdate {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-top: 3px
        }

        /* 권한 배지 */
        #role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            margin-top: 4px;
            border: 1px solid
        }

        .hdr-btns {
            display: flex;
            gap: 6px
        }

        .hdr-btn {
            height: 34px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .hdr-btn:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .06)
        }

        .hdr-btn.accent {
            border-color: rgba(56, 189, 248, .2);
            color: var(--accent)
        }

        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px
        }

        .filter-row::-webkit-scrollbar {
            display: none
        }

        .chip {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(148, 163, 184, .1);
            background: rgba(255, 255, 255, .02);
            color: var(--dim);
            font-weight: 800;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all .25s
        }

        .chip:hover {
            border-color: rgba(56, 189, 248, .3);
            color: var(--text)
        }

        .chip.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(56, 189, 248, .2)
        }

        main {
            padding: 16px;
            display: grid;
            gap: 14px;
            max-width: 580px;
            margin: 0 auto;
            width: 100%
        }

        /* ===== CARD ===== */
        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: border-color .3s
        }

        .card:hover {
            border-color: var(--border-hover)
        }

        /* ▼ 카드 내부 padding은 card-inner로 분리 (배너를 위해) */
        .card-inner {
            padding: 20px
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px
        }

        .region-tag {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: .8
        }

        .site-name {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -.5px;
            line-height: 1.2
        }

        .total-badge {
            text-align: right
        }

        .total-badge .label {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 3px
        }

        .total-badge .val {
            font-size: 20px;
            font-weight: 900;
            color: var(--success)
        }

        /* ===== 알림 UI ===== */
        /* 경고등 (M/A용) */
        @keyframes blink {
            0% {
                opacity: 1
            }

            50% {
                opacity: .2
            }

            100% {
                opacity: 1
            }
        }

        .led-red {
            display: inline-block;
            font-size: 11px;
            margin-left: 6px;
            animation: blink 1s infinite;
            text-shadow: 0 0 8px rgba(248, 113, 113, .8)
        }

        /* 전광판 (B/C/S용) */
        .alert-banner {
            background: rgba(248, 113, 113, .12);
            border-bottom: 1px solid rgba(248, 113, 113, .2);
            color: var(--danger);
            font-size: 11px;
            font-weight: 900;
            padding: 7px 16px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap
        }

        .marquee-content {
            display: inline-block;
            animation: marquee 18s linear infinite
        }

        @keyframes marquee {
            0% {
                transform: translateX(100vw)
            }

            100% {
                transform: translateX(-100%)
            }
        }

        /* 주의(노랑) 전광판 */
        .alert-banner.warn {
            background: rgba(251, 191, 36, .08);
            border-bottom-color: rgba(251, 191, 36, .2);
            color: var(--warning)
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px
        }

        .sbox {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 12px 8px;
            text-align: center;
            position: relative;
            transition: border-color .2s
        }

        .sbox:hover {
            border-color: rgba(255, 255, 255, .12)
        }

        .sbox .lb {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 5px;
            display: block
        }

        .sbox .vl {
            font-size: 16px;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block
        }

        .edit-sm {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 10px;
            opacity: .3;
            transition: opacity .2s;
            padding: 2px
        }

        .edit-sm:hover {
            opacity: 1
        }

        .staff-panel {
            background: linear-gradient(135deg, rgba(56, 189, 248, .04), rgba(129, 140, 248, .03));
            border: 1px solid rgba(56, 189, 248, .08);
            border-radius: var(--r2);
            padding: 12px;
            margin-bottom: 14px;
            position: relative
        }

        .staff-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            gap: 4px
        }

        .staff-grid .lb {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 3px
        }

        .staff-grid .vl {
            font-size: 16px;
            font-weight: 900
        }

        .edit-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all .2s
        }

        .edit-icon:hover {
            background: rgba(56, 189, 248, .1);
            border-color: var(--accent)
        }

        /* ===== 월간 요약 바 ===== */
        .monthly-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 12px;
            padding: 7px 12px;
            background: rgba(255, 255, 255, .02);
            border-radius: 10px;
            border: 1px dashed var(--border);
        }

        .mb-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--dim);
            white-space: nowrap;
        }

        .mb-val {
            color: var(--text)
        }

        .mb-pct {
            font-weight: 900;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .mb-pct.up {
            color: var(--success);
            background: rgba(52, 211, 153, .1)
        }

        .mb-pct.down {
            color: var(--danger);
            background: rgba(248, 113, 113, .1)
        }

        .mb-split {
            color: var(--border);
            font-size: 10px
        }

        .tbl-wrap {
            background: rgba(0, 0, 0, .25);
            border-radius: var(--r2);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 14px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        th {
            padding: 10px 8px;
            text-align: right;
            color: var(--dim);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, .01)
        }

        td {
            padding: 9px 8px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-weight: 700
        }

        td:first-child,
        th:first-child {
            text-align: left
        }

        td:first-child {
            color: var(--accent);
            font-weight: 800
        }

        .row-sum td {
            background: rgba(52, 211, 153, .04);
            font-weight: 900;
            color: var(--success) !important
        }

        .btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px
        }

        .mbtn {
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s
        }

        .mbtn:hover {
            border-color: rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .05)
        }

        .mbtn.pri {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            box-shadow: 0 2px 8px rgba(56, 189, 248, .15)
        }

        .mbtn.pri:hover {
            box-shadow: 0 4px 16px rgba(56, 189, 248, .25)
        }

        /* ===== INLINE PANELS ===== */
        .ipanel {
            display: none;
            margin-top: 14px;
            padding: 18px;
            background: rgba(10, 15, 30, .7);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            animation: slideIn .25s ease-out;
            overflow: hidden;
            max-width: 100%;
            box-sizing: border-box
        }

        .ipanel.show {
            display: block
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .sec-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--accent);
            margin: 18px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            letter-spacing: .3px
        }

        .sec-title:first-child {
            margin-top: 0
        }

        .fg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px
        }

        .fg.c4 {
            grid-template-columns: 1fr 1fr 1fr 1fr
        }

        @media(max-width:400px) {
            .fg.c4 {
                grid-template-columns: 1fr 1fr
            }
        }

        .ff {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .ff label {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700
        }

        .ff input,
        .ff textarea {
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: border-color .2s;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            min-width: 0
        }

        .ff input:focus,
        .ff textarea:focus {
            border-color: var(--accent)
        }

        .ff textarea {
            resize: none;
            height: 56px
        }

        .sv-btn {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: none;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
            letter-spacing: -.2px
        }

        .sv-btn.green {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 2px 10px rgba(52, 211, 153, .2)
        }

        .sv-btn.blue {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 2px 10px rgba(56, 189, 248, .15)
        }

        .sv-btn:disabled {
            opacity: .4
        }

        .sv-msg {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 800
        }

        /* ===== REPORT OVERLAY ===== */
        .ov {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 30, .85);
            backdrop-filter: blur(12px);
            z-index: 1500;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px
        }

        .ov-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 540px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5)
        }

        .ov-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px
        }

        .ov-hdr h3 {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -.3px
        }

        .cls-btn {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s
        }

        .cls-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .ch-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .ch-name {
            width: 48px;
            text-align: right;
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted)
        }

        /* ===== 캘린더 ===== */

            align-items: center;

            font-weight: 900
        }

        .cal-nav {

            align-items: center;

        .cal-nav button {

            border-radius: 8px;

            height: 28px;

            grid-template-columns: repeat(7, 1fr);

        .cal-dow {

            font-weight: 800;

        }

        .intensity-bar {

        }

            border-radius: 50%;

            box-shadow: 0 0 6px rgba(52, 211, 153, .5)
        }

        /* ===== 추이 분석 리포트 ===== */
        .trend-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 30, .95);
            backdrop-filter: blur(20px);
            z-index: 1700;
            display: none;

        }

        .trend-modal.show {
            display: flex
        }

            padding: 20px 24px;

        }

        .trend-body {

        }

        .trend-section-title {
            font-size: 12px;
            font-weight: 900;

        }

            position: relative;
            overflow: hidden;
            border-radius: 8px
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px
        }

        .kpi-box {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;

        }

        .kpi-box .kl {
            font-size: 9px;

            font-weight: 700;
            margin-bottom: 4px
        }

        .kpi-box .kv {
            font-size: 18px;
            font-weight: 900
        }

        .kpi-box .kt {
            font-size: 10px;
            font-weight: 700;

        }

            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;

            color: var(--accent3);
            border: 1px solid rgba(167, 139, 250, .2)
        }

        .report-actions {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: rgba(17, 24, 39, .9);

        }

        .report-btn {
            flex: 1;
            height: 44px;
            border-radius: 10px;

        }

        .report-btn.pri {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff
        }

        .report-btn.sec {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--text)
        }

        .data-table-mini {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px
        }

        .data-table-mini th {
            padding: 6px 8px;
            text-align: center;
            color: var(--dim);
            font-size: 9px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, .01)
        }

        .data-table-mini td {
            padding: 6px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-weight: 700;
            font-size: 11px
        }

        .data-table-mini td:first-child {
            text-align: left;
            color: var(--accent);
            font-weight: 800
        }

        .trend-up {
            color: var(--success)
        }

        .trend-down {
            color: var(--danger)
        }

        .trend-flat {
            color: var(--warning)
        }

        .no-data-msg {
            text-align: center;
            padding: 30px;
            color: var(--dim);
            font-size: 13px
        }

        .goal-input {
            width: 100%;
            background: rgba(56, 189, 248, .06);
            border: 1.5px solid var(--accent);
            border-radius: 6px;
            padding: 4px 6px;
            color: #fff;
            font-size: 14px;
            font-weight: 900;
            text-align: center;
            outline: none;
            margin-top: 2px
        }

        /* ===== 정밀 분석 리포트 탭 ===== */
        .tr-tab {
            padding: 10px 16px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            margin-bottom: -1px
        }

        .tr-tab:hover {
            color: var(--text)
        }

        .tr-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        /* ===== 차트 대시보드 레이아웃 ===== */
        .ch-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 16px;
            overflow: visible; /* ★ v3.8 수정: hidden → visible (내부 가로 스크롤 허용) */
        }

        .ch-panel-title {
            font-size: 13px;
            font-weight: 900;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .ch-panel-sub {
            font-size: 10px;
            color: var(--dim);
            margin-bottom: 14px;
            font-weight: 700
        }

        .ch-apex {
            width: 100%;
            min-height: 10px
        }

        /* ===== KPI 카드 고도화 ===== */
        .kpi-row-v2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 14px
        }

        @media(min-width:480px) {
            .kpi-row-v2 {
                grid-template-columns: repeat(4, 1fr)
            }
        }

        .kpi-v2 {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 10px;
            position: relative;
            overflow: hidden
        }

        .kpi-v2::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 12px 12px 0 0
        }

        .kpi-v2.accent::before {
            background: var(--accent)
        }

        .kpi-v2.success::before {
            background: var(--success)
        }

        .kpi-v2.warning::before {
            background: var(--warning)
        }

        .kpi-v2.danger::before {
            background: var(--danger)
        }

        .kpi-v2 .kv2-lbl {
            font-size: 9px;

            font-weight: 800;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .kpi-v2 .kv2-val {

            font-weight: 900;
            line-height: 1.1
        }

        .kpi-v2 .kv2-sub {
            font-size: 9px;
            color: var(--dim);
            margin-top: 3px;
            font-weight: 700
        }

        .kpi-v2 .kv2-badge {
            display: inline-block;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 800;
            margin-left: 4px;
            vertical-align: middle
        }

        /* ===== 주간 비교 테이블 ===== */
        .week-cmp-tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;

        }

        .week-cmp-tbl th {
            padding: 7px 10px;
            text-align: center;
            color: var(--dim);
            font-size: 9px;
            font-weight: 800;

            white-space: nowrap;  /* ★ v3.8: 열 제목 줄바꿈 방지 */
            min-width: 72px;      /* ★ v3.8: 최소 열 너비 */
        }

        .week-cmp-tbl td {
            padding: 7px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-weight: 700;
            white-space: nowrap;  /* ★ v3.8: 수치 줄바꿈 방지 */
            min-width: 72px;      /* ★ v3.8: 최소 열 너비 */
        }

        /* ★ v3.8: 사업장명 열 — 가로 스크롤 시 좌측 고정 */
        .week-cmp-tbl td:first-child,
        .week-cmp-tbl th:first-child {
            text-align: left;
            color: var(--accent);
            font-weight: 800;
            min-width: 90px;
            position: sticky;
            left: 0;
            background: rgba(17, 24, 39, .97);
            z-index: 2;
            box-shadow: 2px 0 6px rgba(0, 0, 0, .3); /* 고정 열 구분선 */
        }

        .wk-holiday {
            opacity: .35;
            font-style: italic
        }

        .site-bar-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px
        }

        .site-bar-name {
            font-size: 11px;
            font-weight: 800;
            min-width: 60px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .site-bar-track {
            flex: 1;
            height: 20px;
            background: rgba(255, 255, 255, .04);
            border-radius: 6px;

        }

        .site-bar-fill {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: flex-end;

            font-size: 9px;
            font-weight: 800;
            color: #fff;
            transition: width .6s ease;
            min-width: 28px
        }

        .site-bar-avg {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: rgba(255, 255, 255, .25)
        }

        .site-bar-meta {
            font-size: 9px;
            color: var(--dim);
            min-width: 50px;
            text-align: right;
            white-space: nowrap
        }

        .dow-chip {
            display: inline-flex;
            gap: 3px;
            flex-wrap: wrap;
            margin-bottom: 10px
        }

        .dow-chip button {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;

        }

        .dow-chip button.active {

        }

        }

        .chart-scroll-wrap::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>


<body>
    <!-- LOGIN -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-logo">🏢</div>
            <h2>Welstory Dashboard</h2>
            <p>Samsung Welstory 운영 현황 관리 시스템<br />인가된 관계자만 접근 가능합니다</p>
            <div class="login-field">
                <input type="text" id="loginId" placeholder="싱글 아이디" autocomplete="off">
                <div class="domain-tag">@samsung.com</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:flex-end;margin:-4px 0 10px;gap:6px">
                <span id="save-id-label" style="font-size:11px;color:var(--dim);font-weight:600"></span>
                <button id="save-id-btn" onclick="toggleSaveId()"
                    style="padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;line-height:1.4">아이디
                    저장</button>
            </div>
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="login-btn" onclick="doLogin()">로그인</button>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- SPLASH -->
    <div id="splash">
        <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:24px;letter-spacing:-.5px">Welstory
            Dashboard</div>
        <div class="sp-ring"></div>
        <div style="margin-top:20px;font-size:13px;color:var(--dim)">데이터를 불러오는 중...</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <header>
            <div class="header-top">
                <div>
                    <!-- ① 헤더 타이틀: 권한별 동적 변경 -->
                    <h1 id="main-title">Welstory 사업장 현황</h1>

                </div>
                <div class="hdr-btns">
                    <!-- ③ M/A/B만 리포트 버튼 표시 (기본 숨김, 권한 확인 후 조건부 표시) -->
                    <button id="rpt-btn" class="hdr-btn accent" style="display:none" onclick="openReport()">📊
                        리포트</button>
                    <!-- ③ M/A만 추이 분석 접근 (C/S 숨김) -->
                    <button id="trend-btn" class="hdr-btn" onclick="openTrendReport()" title="추이 분석 리포트">📈</button>
                    <button class="hdr-btn" onclick="openCal()" title="데일리 식수 열람">📅</button>
                    <button class="hdr-btn" onclick="location.reload()">↻</button>

        <div class="ov-box" id="ov-ct" onclick="event.stopPropagation()"></div>

    <script>
        /* =====================================================
           ★ v2 전역 상수 & 권한 변수
        ===================================================== */
        const API = "https://script.google.com/macros/s/AKfycbxwJIGmBlO-bNYlwGpibBmP4cyBDYvGbpP9hWTxSabgNBGdUL5Ap24v1XqHVtscKgyk/exec";
        /* ① 역매핑: 서버 난독화 키 → 한글 키 */
        const RM = {
            "a": "사업장명", "b": "지역",
            "c1": "영양사", "c2": "조리사", "c3": "웰프로_주", "c4": "웰프로_야",
            "d1": "좌석수", "d2": "코너수", "d3": "TO_코너수",
            "e1": "DI_조식", "e2": "DI_중식", "e3": "DI_석식", "e4": "DI_야식",
            "f1": "TO_조식", "f2": "TO_중식", "f3": "TO_석식", "f4": "TO_야식",
            "e5": "DI_조식(주말)", "e6": "DI_중식(주말)", "e7": "DI_석식(주말)", "e8": "DI_야식(주말)",
            "f5": "TO_조식(주말)", "f6": "TO_중식(주말)", "f7": "TO_석식(주말)", "f8": "TO_야식(주말)",
            "g1": "회전율(중식_T/O포함)", "g2": "회전율(중식_T/O제외)",
            "h1": "도전매출", "h2": "도전영업이익", "h3": "목표재료비",
            "m1": "금월_평균중식", "m2": "전월대비", "m3": "조업일수"
        };
        function deobf(arr) { return arr.map(row => { const o = {}; Object.keys(row).forEach(k => { o[RM[k] || k] = row[k] }); return o }); }

        let D = [], USER = null, TK = null, REG = "ALL";
        let USER_ROLE = 'C';         // ★ 권한 등급 (M/A/B/C/S)
        let USER_REGION = '';        // ★ 담당지역
        let USER_SITE = '';          // ★ 소속사업장
        let OV = JSON.parse(sessionStorage.getItem("OV") || "{}");

        /* ★ GAS 실적 데이터 캐시 (추이 리포트용) */
        let _gasPerfCache = null;   // 로딩된 서버 실적 데이터
        let _gasPerfLoading = false; // 로딩 중 플래그
        let _gasPerfLoaded = false;  // 최초 로드 완료 플래그

        function so() { sessionStorage.setItem("OV", JSON.stringify(OV)); }
        function n(v) { if (v == null) return 0; const t = String(v).trim(); if (!t || t === "-") return 0; const x = parseFloat(t.replace(/[^0-9.-]/g, '')); return isFinite(x) ? x : 0; }
        function f(v) { const x = n(v); return x === 0 ? "-" : x.toLocaleString(); }
        function rc(v) { return v >= 3.5 ? "var(--danger)" : v >= 2.5 ? "var(--warning)" : "var(--success)"; }
        function ov(sn, k, fb) { return (OV[sn] && OV[sn][k] != null) ? Number(OV[sn][k]) : fb; }
        function gSt(d) { const sn = d["사업장명"]; return ov(sn, "영양사", n(d["영양사"])) + ov(sn, "조리사", n(d["조리사"])) + ov(sn, "웰프로_주", n(d["웰프로_주"])) + ov(sn, "웰프로_야", n(d["웰프로_야"])); }
        function gMS(sn, m) { const o = OV[sn]; if (o && o[m + "_평일"] > 0) return Number(o[m + "_평일"]); const d = D.find(x => x["사업장명"] === sn); return d ? gSt(d) : 1; }
        function gSeats(d) { return ov(d["사업장명"], "좌석수", n(d["좌석수"])); }
        function inten(d) { const st = gSt(d) || 1, tm = ["조식", "중식", "석식", "야식"].reduce((a, m) => a + n(d["DI_" + m]) + n(d["TO_" + m]), 0); return { s: tm / st, tm, st }; }
        function iLb(s) { if (s >= 95) return { t: "과부하", e: "🔴", c: "var(--danger)", b: "rgba(248,113,113,.1)" }; if (s >= 80) return { t: "주의", e: "🟡", c: "var(--warning)", b: "rgba(251,191,36,.1)" }; return { t: "양호", e: "🟢", c: "var(--success)", b: "rgba(52,211,153,.1)" }; }

        /* =====================================================
           ★ 권한별 UI 제어 함수
        ===================================================== */
        const ROLE_LABEL = { M: "마스터", A: "지역장", B: "PM", C: "담당자", S: "스탭" };
        const ROLE_COLOR = { M: "#f87171", A: "#fbbf24", B: "#38bdf8", C: "#34d399", S: "#818cf8" };

        function applyRoleUI() {
            /* 헤더 타이틀 동적 변경 */
            const titleEl = document.getElementById("main-title");
            if (USER_ROLE === "M") titleEl.textContent = "전체 사업장 현황";
            else if (USER_ROLE === "A" || USER_ROLE === "B") titleEl.textContent = `${USER_REGION} 사업장 현황`;
            else titleEl.textContent = USER_SITE || "내 사업장 현황";

            /* 권한 배지 */
            const badge = document.getElementById("role-badge");
            const col = ROLE_COLOR[USER_ROLE] || "#64748b";
            const lbl = ROLE_LABEL[USER_ROLE] || USER_ROLE;
            badge.style.cssText = `display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-top:4px;border:1px solid ${col}40;color:${col};background:${col}12`;
            badge.textContent = `● ${lbl}`;

            /* ③ 리포트·출력 버튼 권한 제어 */
            const canReport = ["M", "A", "B"].includes(USER_ROLE);
            const canExport = ["M", "A"].includes(USER_ROLE);

            // 추이 분석 버튼 (C/S 숨김)
            document.getElementById("trend-btn").style.display = canReport ? "flex" : "none";
            // 추출·복사 버튼 (M/A만)
            document.getElementById("export-btn").style.display = canExport ? "flex" : "none";
            document.getElementById("copy-btn").style.display = canExport ? "flex" : "none";
        }

        /* =====================================================
           ★ 알림 트리거 판단 함수
           기준 ①: 직전 5개 기록 대비 중식 ±15% 이상 변동
           기준 ②: 회전율 2.5 이상 (과부하)
        ===================================================== */
        /* =====================================================
           ★ 징검다리 휴일 자동 감지 (알람 예외 처리)
           - 징검다리 휴일: 공휴일 사이에 끼어 있는 평일
           - 간이 판단: 주변 1~2일이 토일이고 해당일이 평일인 경우
           - 정확한 공휴일 목록이 없으므로 패턴 기반 감지 사용
        ===================================================== */
        /* ===== ⑤ 한국 공휴일/징검다리(샌드위치) 인지 =====
           - 주의: 음력 공휴일/대체공휴일은 매년 변동됩니다.
           - 운영 방식: 연말에 KOR_HOLIDAYS_BY_YEAR[YYYY]만 업데이트하면 됩니다.
           - '징검다리' 정의(엄격): 평일(근무일)이면서 전날과 다음날이 모두 '휴무(주말/공휴일)'인 경우
        */
        const KOR_HOLIDAYS_BY_YEAR = {
            2026: [
                "2026-01-01", // 신정
                "2026-02-16", "2026-02-17", "2026-02-18", // 설날 연휴
                "2026-03-01", "2026-03-02", // 3.1절(일) + 대체공휴일
                "2026-05-05", // 어린이날
                "2026-05-24", "2026-05-25", // 부처님오신날(일) + 대체공휴일
                "2026-06-03", // 전국동시지방선거(예정) ※법정공휴일
                "2026-06-06", // 현충일(토) ※대체공휴일 없음
                "2026-08-15", "2026-08-17", // 광복절(토) + 대체공휴일
                "2026-09-24", "2026-09-25", "2026-09-26", // 추석 연휴
                "2026-10-03", "2026-10-05", // 개천절(토) + 대체공휴일
                "2026-10-09", // 한글날
                "2026-12-25"  // 성탄절
            ]
        };

        function _toYMD(d) {
            const x = (d instanceof Date) ? d : new Date(d);
            if (isNaN(x.getTime())) return "";
            const y = x.getFullYear();
            const m = String(x.getMonth() + 1).padStart(2, '0');
            const dd = String(x.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }
        function _isWeekend(ymd) {
            const d = new Date(ymd + "T00:00:00");
            const day = d.getDay();
            return (day === 0 || day === 6);
        }
        function _isHoliday(ymd) {
            const y = Number(String(ymd).slice(0, 4));
            const list = KOR_HOLIDAYS_BY_YEAR[y] || [];
            return list.includes(ymd);
        }
        function getHolidayType(ymd) {
            if (!ymd) return { type: "workday", label: "평일" };
            if (_isWeekend(ymd)) return { type: "weekend", label: "주말" };
            if (_isHoliday(ymd)) return { type: "holiday", label: "공휴일" };

            // 엄격 징검다리: 전날/다음날이 모두 휴무(주말/공휴일)
            const d = new Date(ymd + "T00:00:00");
            const prev = new Date(d); prev.setDate(d.getDate() - 1);
            const next = new Date(d); next.setDate(d.getDate() + 1);
            const p = _toYMD(prev), n = _toYMD(next);

            const isOff = (s) => _isWeekend(s) || _isHoliday(s);
            if (isOff(p) && isOff(n)) {
                return { type: "sandwich", label: "징검다리" };
            }
            return { type: "workday", label: "평일" };
        }

        function getAlertStatus(sn) {
            const recs = getRec().filter(r => r.siteName === sn).sort((a, b) => a.date > b.date ? -1 : 1);
            const d = D.find(x => x["사업장명"] === sn);
            let trigger = false, level = "warn", msg = "";

            /* 기준 ②: 회전율 경고 로직 제거 (사용자 요청: T/O 포함 회전율 경고 제외) 
            if (d) {
                const diMid = n(d["DI_중식"]), toMid = n(d["TO_중식"]);
                const seats = gSeats(d) || 1;
                const ri = (n(d["회전율(중식_T/O포함)"]) || 0) || (diMid + toMid) / seats;
                if (ri >= 3.5) { trigger = true; level = "danger"; msg = `⚠️ 회전율 과부하 감지 (${ri.toFixed(1)}회전) — 좌석 운영 점검 필요`; }
            }
            */

            /* 기준 ①: 중식 ±15% 이상 변동 (최근 5일 평균 대비 오늘) */
            if (!trigger && recs.length >= 3) {
                const todayStr = recs[0].date;
                const dayInfo = getHolidayType(todayStr); // weekend/holiday/sandwich/workday

                const vals = recs.slice(1, 6).map(r => (r.DI_중식 || 0) + (r.TO_중식 || 0));
                const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
                const today = (recs[0].DI_중식 || 0) + (recs[0].TO_중식 || 0);

                if (avg > 0) {
                    const chg = (today - avg) / avg * 100;
                    if (Math.abs(chg) >= 15) {
                        trigger = true;

                        // 기본 레벨/메시지
                        level = chg > 0 ? "warn" : "danger";
                        msg = chg > 0
                            ? `📈 중식 급증 감지 (+${chg.toFixed(0)}%) — 식재료 발주 점검 요망`
                            : `📉 중식 급감 감지 (${chg.toFixed(0)}%) — 원인 분석 필요`;

                        // ✨ 예외 처리: 휴무/징검다리로 인한 '감소'는 경고 단계를 완화
                        if (chg < 0 && (dayInfo.type === "sandwich" || dayInfo.type === "holiday" || dayInfo.type === "weekend")) {
                            level = "warn";
                            const tag = (dayInfo.type === "sandwich") ? "징검다리" : dayInfo.label;
                            msg = `📉 중식 감소 감지 (${chg.toFixed(0)}%) — ${tag} 영향 추정`;
                        }
                    }
                }
            }
            return { trigger, level, msg };
        }

        /* =====================================================
           ★ v3.7: 세션 복원 시 접속 로그 전송
        ===================================================== */
        async function sendSessionLog(token, userId) {
            try {
                const url = API + "?type=sessionLog&tk=" + encodeURIComponent(token)
                              + "&hint=" + encodeURIComponent(userId || "");
                const r = await fetch(url, { redirect: "follow" });
                const t = await r.text();
                if (t === "token_expired") {
                    console.warn("세션 토큰 만료 — 재로그인 필요");
                    try { sessionStorage.removeItem("WTK"); localStorage.removeItem("WTK"); } catch(e) {}
                    return "expired";
                }
                console.log("sessionLog 전송 성공:", userId);
                return "ok";
            } catch(e) {
                console.warn("sessionLog 전송 실패 (1차):", e.message);
                try {
                    await new Promise(r => setTimeout(r, 1000));
                    await fetch(API + "?type=sessionLog&tk=" + encodeURIComponent(token)
                                  + "&hint=" + encodeURIComponent(userId || ""), { redirect: "follow" });
                    console.log("sessionLog 재시도 성공");
                } catch(e2) { console.warn("sessionLog 재시도도 실패:", e2.message); }
                return "ok";
            }
        }

        /* ★ v3.7: 로그아웃 시 세션 정리 */
        window.doLogout = function() {
            sessionStorage.removeItem("WS"); sessionStorage.removeItem("WTK");
            sessionStorage.removeItem("WR"); sessionStorage.removeItem("WRG"); sessionStorage.removeItem("WST");
            localStorage.removeItem("WTK"); localStorage.removeItem("WS");
            localStorage.removeItem("WR"); localStorage.removeItem("WRG"); localStorage.removeItem("WST");
            location.reload();
        };

        /* =====================================================
           ★ LOGIN (v3.7: sessionStorage + localStorage 이중 저장)
        ===================================================== */
        window.doLogin = async function () {
            const err = document.getElementById("login-error"); err.style.display = "none";
            const id = document.getElementById("loginId").value.trim(), pw = document.getElementById("loginPw").value, btn = document.querySelector(".login-btn");
            if (!id || !pw) { err.innerText = "아이디와 비밀번호를 입력하세요."; err.style.display = "block"; return; }
            btn.innerText = "접속 중..."; btn.disabled = true;
            try {
                /* ★ GAS 응답: "Valid|TOKEN|ROLE|REGION|SITE" */
                const r = await fetch(API + "?type=login&userId=" + encodeURIComponent(id) + "&pw=" + encodeURIComponent(pw), { redirect: "follow" });
                const t = await r.text();
                if (t.startsWith("Valid")) {
                    const parts = t.split("|");
                    USER = id; TK = parts[1] || null;
                    USER_ROLE = parts[2] || "C";
                    USER_REGION = parts[3] || "";
                    USER_SITE = parts[4] || "";
                    /* 로그인 성공 정보는 메모리에만 유지 (새로고침/재접속 시 비밀번호 재입력 필수) */
                    try {
                        sessionStorage.removeItem("WS");
                        sessionStorage.removeItem("WTK");
                        sessionStorage.removeItem("WR");
                        sessionStorage.removeItem("WRG");
                        sessionStorage.removeItem("WST");
                        localStorage.removeItem("WS");
                        localStorage.removeItem("WTK");
                        localStorage.removeItem("WR");
                        localStorage.removeItem("WRG");
                        localStorage.removeItem("WST");
                    } catch (e) { }
                    document.getElementById("login-overlay").style.display = "none";
                    applyRoleUI();
                    init();
                    setTimeout(() => initSecurity(id), 500);
                    /* ★ v3.7: 아이디 저장 설정 반영 */
                    if (localStorage.getItem("WS_SAVE_ID_ON") === "Y") {
                        localStorage.setItem("WS_SAVE_ID", id);
                    }
                } else {
                    err.innerText = t === "NoPermission" ? "등록되지 않은 계정입니다." : (t === "PasswordNotSet" ? "계정 비밀번호가 설정되지 않았습니다. 관리자에게 문의하세요." : "비밀번호가 올바르지 않습니다.");
                    err.style.display = "block";
                }
            } catch (e) { err.innerText = "통신 오류: " + e.message; err.style.display = "block"; }
            btn.innerText = "로그인"; btn.disabled = false;
        };

        /* =====================================================
           ★ DATA LOAD
        ===================================================== */
        async function init() {
            const sp = document.getElementById("splash"), db = document.getElementById("dashboard");

            // [개선 4-A] 로컬 캐시 즉시 표시
            const cachedData = localStorage.getItem("WS_D_CACHE");
            if (cachedData) {
                try {
                    D = JSON.parse(cachedData);
                    const now = new Date();
                    document.getElementById("lastUpdate").innerText = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")} 캐시 로드됨`;
                    sp.style.display = "none";
                    db.style.display = "flex";
                    db.style.opacity = "1";
                    chips(); render();
                } catch (e) { }
            } else {
                sp.style.display = "flex";
            }

            try {
                if (!TK) {
                    document.getElementById("login-overlay").style.display = "flex";
                    throw new Error("auth_required");
                }
                const url = API + "?tk=" + TK;
                const r = await fetch(url, { redirect: "follow" });
                const raw = await r.json();
                if (raw.error) throw new Error(raw.error);

                if (raw.data) {
                    D = deobf(raw.data);
                    if (!USER_ROLE || USER_ROLE === "C") { USER_ROLE = raw.role || "C"; USER_REGION = raw.region || ""; USER_SITE = raw.site || ""; }
                } else {
                    D = deobf(raw || []);
                }

                // [개선 4-A] 데이터 로컬 저장
                localStorage.setItem("WS_D_CACHE", JSON.stringify(D));

                applyRoleUI();
                chips(); render();
                const now = new Date();
                document.getElementById("lastUpdate").innerText = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")} 업데이트`;
                sp.style.opacity = "0";
                setTimeout(() => { sp.style.display = "none"; db.style.display = "flex"; db.style.opacity = "1"; }, 400);
            } catch (e) {
                if (!D.length) {
                    sp.style.display = "none"; db.style.display = "flex"; db.style.opacity = "1";
                    document.getElementById("grid").innerHTML = `<div style="padding:50px 20px;text-align:center"><div style="font-size:36px;margin-bottom:16px">⚠️</div><p style="color:var(--muted);font-size:14px;margin-bottom:20px">${e.message}</p><button class="sv-btn blue" style="width:auto;padding:0 32px" onclick="location.reload()">다시 시도</button></div>`;
                }
            }
        }

        /* =====================================================

                : "";
        }
        window.setR = function (r) { REG = r; chips(); render(); };

        /* ===== 추이 분석 리포트 ===== */

            }

            /* GAS에서 실적 데이터 로드 (최초 1회) */

            /* 지역 드롭다운 초기화 */

        window.refreshTrendFromGAS = async function () {

        /* ===== 탭 전환 ===== */
        let _trendActiveTab = 'trend';
        window.switchTrendTab = function (tab) {

        /* ===== ApexCharts 공통 옵션 ===== */
        const APEX_BASE = {
            chart: { background: 'transparent', toolbar: { show: false }, animations: { enabled: true, easing: 'easeinout', speed: 600 } },
            theme: { mode: 'dark' },
            grid: { borderColor: 'rgba(148,163,184,.08)', strokeDashArray: 3 },
            tooltip: { theme: 'dark', style: { fontSize: '12px' } },
            xaxis: { labels: { style: { colors: '#64748b', fontSize: '10px', fontWeight: 700 } }, axisBorder: { show: false }, axisTicks: { show: false } },
            yaxis: { labels: { style: { colors: '#64748b', fontSize: '10px' } } },
            legend: { labels: { colors: '#94a3b8' }, fontSize: '11px' },
        };
        const C_MEALS = { 조식: '#f59e42', 중식: '#38bdf8', 석식: '#a78bfa', 합계: '#34d399' };

        function linReg(ys) {
            const nn = ys.length; if (nn < 2) return { slope: 0, intercept: ys[0] || 0 };
            const xm = (nn - 1) / 2, ym = ys.reduce((a, b) => a + b, 0) / nn;
            const num = ys.reduce((s, y, i) => s + (i - xm) * (y - ym), 0);
            const den = ys.reduce((s, _, i) => s + (i - xm) ** 2, 0);
            const slope = den ? num / den : 0;
            return { slope, intercept: ym - slope * xm };
        }
        /* ======================================================
           ★ 저조기 판단 (고정 공휴일 + 동적 검출)
           - 설연휴 등 공휴일 직후 3일은 자동 저조기
           - 기록값이 전체 평균의 60% 미만이면 저조기로 분류
        ====================================================== */
        function isLowSeason(dateStr, normalAvg) {
            // 고정 저조기 패턴: 공휴일 직후 n일
            const ht = getHolidayType(dateStr);
            if (ht.type !== 'workday') return false; // 휴일 자체는 제외
            const prevDay = new Date(dateStr + 'T00:00:00');
            prevDay.setDate(prevDay.getDate() - 1);
            const prevHt = getHolidayType(_toYMD(prevDay));
            if (prevHt.type === 'holiday') return true; // 공휴일 다음날
            return false;
        }

        // 전역 현재 끼니 선택
        window._mkSel = window._mkSel || '중식';
        window._trendSiteFilter = window._trendSiteFilter || [];

        function renderTrendReport() {
            const recs = getRec();
            const body = document.getElementById("trend-body");
            const regSel = document.getElementById("trend-region-sel");
            const selRegion = regSel ? regSel.value : "ALL";
            const regionSites = selRegion === "ALL" ? null : new Set(D.filter(d => d["지역"] === selRegion).map(d => d["사업장명"]));
            const recsToUse = selRegion === "ALL" ? recs : recs.filter(r => regionSites && regionSites.has(r.siteName));
            const regionLabel = selRegion === "ALL" ? "전체 지역" : selRegion;

            if (!recsToUse.length) {
                body.innerHTML = `<div class="no-data-msg"><div style="font-size:48px;margin-bottom:16px">📭</div><div style="font-size:15px;font-weight:900;margin-bottom:8px">누적 데이터 없음</div><div style="font-size:12px;color:var(--dim)">${regionLabel} · 실적 기록 후 분석 가능합니다</div></div>`;
                return;
            }

            const dates = [...new Set(recsToUse.map(r => r.date))].sort();
            document.getElementById("trend-date-range").textContent =
                `[${regionLabel}] ${dates[0]} ~ ${dates[dates.length - 1]} · ${dates.length}일 · ${recsToUse.length}건`;
            const sites = [...new Set(recsToUse.map(r => r.siteName))];

            // 사업장 필터 적용
            const sfilt = window._trendSiteFilter || [];
            const activeSites = sfilt.length ? sfilt.filter(s => sites.includes(s)) : sites;
            const filtRecs = sfilt.length ? recsToUse.filter(r => sfilt.includes(r.siteName)) : recsToUse;

            // 날짜별 집계 (끼니별)
            const byDate = { 조식: {}, 중식: {}, 석식: {}, 야식: {} };
            filtRecs.forEach(r => {
                ['조식', '중식', '석식', '야식'].forEach(m => {
                    byDate[m][r.date] = (byDate[m][r.date] || 0) + n(r['DI_' + m]) + n(r['TO_' + m]);
                });

            // 평일/저조기/주말 분류
            const wdDates = dates.filter(d => getHolidayType(d).type === 'workday');
            const weDates = dates.filter(d => { const t = getHolidayType(d).type; return t === 'weekend' || t === 'holiday'; });
            const midVals_wd = wdDates.map(d => byDate['중식'][d] || 0).filter(v => v > 0);
            const midAvgWd = midVals_wd.length ? midVals_wd.reduce((a, b) => a + b, 0) / midVals_wd.length : 0;
            // 저조기: 평일 평균의 65% 미만인 평일 날짜
            const lowDates = wdDates.filter(d => {
                const v = byDate['중식'][d] || 0; return v > 0 && v < midAvgWd * 0.65;
            });
            const normalDates = wdDates.filter(d => !lowDates.includes(d) && (byDate['중식'][d] || 0) > 0);

            // 끼니 선택 버튼 상태 전역 보존
            const mk = window._mkSel || '중식';
            const MK_COLOR = { 조식: '#f97316', 중식: '#38bdf8', 석식: '#a78bfa', 야식: '#f472b6', 합계: '#34d399' };
            const mkColor = MK_COLOR[mk] || '#38bdf8';

            // 끼니 값 가져오기 (합계 포함)
            const getMkVal = (d) => mk === '합계'
                ? (['조식', '중식', '석식', '야식'].reduce((s, m) => s + (byDate[m][d] || 0), 0))
                : (byDate[mk]?.[d] || 0);

            const normVals = normalDates.map(d => getMkVal(d)).filter(v => v > 0);
            const lowVals = lowDates.map(d => getMkVal(d)).filter(v => v > 0);
            const normAvg = normVals.length ? Math.round(normVals.reduce((a, b) => a + b, 0) / normVals.length) : 0;
            const lowAvg = lowVals.length ? Math.round(lowVals.reduce((a, b) => a + b, 0) / lowVals.length) : 0;
            const dropPct = normAvg > 0 ? Math.round((1 - lowAvg / normAvg) * 100) : 0;

            // 차트 인스턴스 정리
            if (window._apexCharts) { window._apexCharts.forEach(c => { try { c.destroy(); } catch (e) { } }); }
            window._apexCharts = [];

            // 공유 컨텍스트 저장
            window._trCtx = {

            };

            const tab = _trendActiveTab;
            if (tab === 'trend') renderTabTrend(body);

        /* 끼니 버튼 클릭 */
        window.setMealKey = function (mk) {

        function _toYMD(dt) { return dt.toISOString().slice(0, 10); }

        /* 끼니 + 사업장 필터 패널 HTML */
        function mkFilterHTML(mk, sites, siteFilter) {
            const MK_COLOR = { 조식: '#f97316', 중식: '#38bdf8', 석식: '#a78bfa', 야식: '#f472b6', 합계: '#34d399' };

        /* ─────────────── TAB 1: 추이 & 예측 ─────────────── */
        function renderTabTrend(body) {
            const { filtRecs, dates, sites, wdDates, lowDates, normalDates, byDate,
                normAvg, lowAvg, dropPct, mk, mkColor, getMkVal, normVals, regionLabel } = window._trCtx;
            const sfilt = window._trendSiteFilter || [];

            // DI / TO 분리
            const diByDate = {}, toByDate = {};
            const diKey = 'DI_' + (mk === '합계' ? '중식' : mk);
            const toKey = 'TO_' + (mk === '합계' ? '중식' : mk);
            filtRecs.forEach(r => { diByDate[r.date] = (diByDate[r.date] || 0) + n(r[diKey]); toByDate[r.date] = (toByDate[r.date] || 0) + n(r[toKey]); });
            const totalDI = Object.values(diByDate).reduce((a, b) => a + b, 0);
            const totalTO = Object.values(toByDate).reduce((a, b) => a + b, 0);
            const sumDITO = totalDI + totalTO || 1;
            const diPct = Math.round(totalDI / sumDITO * 100), toPct = 100 - diPct;

            // 조식 실측
            const joVals = wdDates.map(d => byDate['조식']?.[d] || 0).filter(v => v > 0);
            const joAvg = joVals.length ? Math.round(joVals.reduce((a, b) => a + b, 0) / joVals.length) : 0;

            // 최근 7평일 vs 전체 평일 비교
            const rec7wd = wdDates.filter(d => !lowDates.includes(d)).slice(-7).map(d => getMkVal(d)).filter(v => v > 0);
            const r7avg = rec7wd.length ? Math.round(rec7wd.reduce((a, b) => a + b, 0) / rec7wd.length) : normAvg;
            const trendPct = normAvg > 0 ? ((r7avg - normAvg) / normAvg * 100).toFixed(1) : 0;
            const trendCls = trendPct > 0 ? '#34d399' : trendPct < 0 ? '#f87171' : '#fbbf24';

            // ★ v3.8 수정: wdValsFr/weValsFr 선언을 AI 정확도 블록보다 먼저 이동
            //   이전 버전은 const wdValsFr가 사용(line ~2810) 이후에 선언(line ~2829)되어
            //   JavaScript Temporal Dead Zone ReferenceError 발생 → 추이/예측 탭 전체 미렌더링
            const wdValsFr = normalDates.map(d => getMkVal(d)).filter(v => v > 0);
            const weValsFr = (window._trCtx.weDates || []).map(d => getMkVal(d)).filter(v => v > 0);
            const { slope: wdSlope, intercept: wdInt } = linReg(wdValsFr);
            const { slope: weSlope, intercept: weInt } = linReg(weValsFr.length >= 2 ? weValsFr : [0, 0]);

            // ★ AI 예측 정확도 산출 (MAPE 기반) — wdValsFr 선언 이후에 사용
            let aiAccuracy = null;
            if (wdValsFr.length >= 5) {
                // Leave-one-out: 마지막 3개 데이터를 예측해보고 실제와 비교
                const testN = Math.min(3, Math.floor(wdValsFr.length / 3));
                if (testN > 0) {
                    const trainVals = wdValsFr.slice(0, -testN);
                    const testVals = wdValsFr.slice(-testN);
                    const { slope: tSlope, intercept: tInt } = linReg(trainVals);
                    let sumAPE = 0;
                    testVals.forEach((actual, i) => {
                        const predicted = Math.max(0, Math.round(tInt + tSlope * (trainVals.length + i)));
                        if (actual > 0) sumAPE += Math.abs(actual - predicted) / actual;
                    });
                    const mape = sumAPE / testN * 100;
                    aiAccuracy = Math.max(0, Math.round(100 - mape));
                }
            }
            const aiAccText = aiAccuracy !== null ? `${aiAccuracy}%` : '산출불가';
            const aiAccColor = aiAccuracy !== null ? (aiAccuracy >= 80 ? '#34d399' : aiAccuracy >= 60 ? '#fbbf24' : '#f87171') : 'var(--dim)';
            const lastDate = new Date(dates[dates.length - 1] + 'T00:00:00');
            const foreRows = [];

                const ds = _toYMD(fd), ht = getHolidayType(ds);
                const isOff = ht.type !== 'workday';
                const fv = isOff ? Math.max(0, Math.round(weInt + weSlope * weN)) : Math.max(0, Math.round(wdInt + wdSlope * wdN));
                if (isOff) weN++; else wdN++;
                foreRows.push({ ds, fv, ht, isOff });
            }

            // 차트용 시계열 데이터 (과거 + 예측)
            const allDates = [...dates, ...foreRows.map(r => r.ds)];
            const histData = dates.map(d => getMkVal(d));
            const foreData = [...new Array(dates.length).fill(null), ...foreRows.map(r => r.fv)];

            const pointColors = dates.map(d => lowDates.includes(d) ? '#fbbf24' : mkColor);

            body.innerHTML = `
            <div style="padding:4px 0 16px">

                    <div class="kpi-v2 warning"><div class="kv2-lbl">저조기 평균</div><div class="kv2-val" style="color:#fbbf24">${lowAvg > 0 ? lowAvg.toLocaleString() : '-'}<span style="font-size:11px;opacity:.7"> 식</span></div><div class="kv2-sub">${lowDates.length}일 해당</div></div>
                    <div class="kpi-v2 danger"><div class="kv2-lbl">저조기 낙폭</div><div class="kv2-val" style="color:#f87171">▼${dropPct}<span style="font-size:14px;opacity:.7">%</span></div><div class="kv2-sub">정상 대비</div></div>
                    <div class="kpi-v2 ${trendPct > 0 ? 'success' : trendPct < 0 ? 'danger' : 'warning'}"><div class="kv2-lbl">최근 7일 추이 (평일)</div><div class="kv2-val" style="color:${trendCls}">${r7avg.toLocaleString()}<span style="font-size:11px;opacity:.7"> 식</span></div><div class="kv2-sub">${trendPct > 0 ? '↑' : '↓'} ${Math.abs(trendPct)}% vs 전체평균</div></div>
                </div>
                <!-- 낙폭 바 패널 -->
                <div class="ch-panel" style="margin:0;padding:14px 16px">
                    <div style="font-size:11px;font-weight:900;margin-bottom:10px">📉 정상 대비 저조기 낙폭</div>
                    ${['중식', '합계', '석식', '조식'].map(m => {

        /* ─────────────── TAB 3: 사업장 비교 ─────────────── */
        function renderTabSites(body) {
            const { filtRecs, dates, sites, normalDates, lowDates, byDate, mk, mkColor, normAvg, regionLabel } = window._trCtx;
            const sfilt = window._trendSiteFilter || [];
            const SC = ['#38bdf8', '#34d399', '#fb923c', '#f472b6', '#a78bfa', '#fbbf24', '#60a5fa'];

            const getMkValSite = (recs, m) => recs.reduce((s, r) => s + n(r['DI_' + m]) + n(r['TO_' + m]), 0);
            const siteData = sites.map((site, si) => {
                const sr = filtRecs.filter(r => r.siteName === site);
                const byD = {};
                sr.forEach(r => { const v = mk === '합계' ? ['조식', '중식', '석식', '야식'].reduce((s, m) => s + n(r['DI_' + m]) + n(r['TO_' + m]), 0) : n(r['DI_' + mk]) + n(r['TO_' + mk]); byD[r.date] = (byD[r.date] || 0) + v; });
                const wdV = normalDates.filter(d => (byD[d] || 0) > 0).map(d => byD[d]);
                const wdA = wdV.length ? Math.round(wdV.reduce((a, b) => a + b, 0) / wdV.length) : 0;
                const jo = getMkValSite(sr, '조식'), mi = getMkValSite(sr, '중식'), sk = getMkValSite(sr, '석식');
                const { slope } = linReg(wdV.slice(-14));
                return { site, byD, wdA, jo, mi, sk, total: jo + mi + sk, slope, color: SC[si % SC.length] };
            }).sort((a, b) => b.wdA - a.wdA);

            const overallAvg = Math.round(siteData.reduce((s, d) => s + d.wdA, 0) / (siteData.length || 1));

            // 주간 비교 (공통 데이터 있는 주 + 예측 3주)
            // ★ v3.8 수정: 주차 기준을 월별 기준 → 연간 누적 기준으로 변경
            //   예전: Math.ceil((dt.getDate() + 월첫날요일) / 7) → 매월 1주차부터 재시작
            //   수정: 연초(1월1일)부터의 누적 주차 (1주차, 2주차, ... 52/53주차)
            function getAnnualWeekNum(d) {
                const jan1 = new Date(d.getFullYear(), 0, 1);
                const dayOfYear = Math.floor((d - jan1) / 86400000);
                return Math.ceil((dayOfYear + jan1.getDay() + 1) / 7);
            }
            // 주차 키에서 표시 레이블 변환: "2026-W05" → "5주차", "2026-W05 (예측)" → "5주차 (예측)"
            function weekLabel(wKey) {
                const m = wKey.match(/W(\d+)/);
                const num = m ? parseInt(m[1], 10) : '?';
                return wKey.includes('예측') ? `${num}주차 (예측)` : `${num}주차`;
            }
            const weekMap = {};
            dates.forEach(d => {
                const dt = new Date(d + 'T00:00:00');
                const wn = `${dt.getFullYear()}-W${String(getAnnualWeekNum(dt)).padStart(2, '0')}`;
                if (!weekMap[wn]) weekMap[wn] = {};
                sites.forEach(site => {
                    const val = filtRecs.filter(r => r.siteName === site && r.date === d).reduce((s, r) => s + (mk === '합계' ? ['조식', '중식', '석식', '야식'].reduce((ss, m) => ss + n(r['DI_' + m]) + n(r['TO_' + m]), 0) : n(r['DI_' + mk]) + n(r['TO_' + mk])), 0);
                    if (val > 0) weekMap[wn][site] = (weekMap[wn][site] || 0) + val;
                });
            });
            
            const validWeeks = Object.entries(weekMap).filter(([, sv]) => sites.every(s => (sv[s] || 0) > 0)).slice(-4);
            const lastWeekEntry = validWeeks[validWeeks.length - 1];
            const currentWeekId = lastWeekEntry ? lastWeekEntry[0] : "";

            // 추가 예측 3주 (단순 산형 예측)

                    siteData.forEach(sd => {

                <div class="ch-panel-sub">▲초록=평균 상회 / ▼빨강=평균 하회 · 저조기 제외 기준</div>

                    <div class="kpi-v2 success" style="flex:1;min-width:80px"><div class="kv2-lbl">전체 합계</div><div class="kv2-val" style="color:#34d399">${(rptTotalDI + rptTotalTO).toLocaleString()}<span style="font-size:11px;opacity:.7">식</span></div><div class="kv2-sub">${dates.length}일 기준</div></div>
