            h += `</tbody></table></div>`;

            /* 상황 진단 가이드 추가 */
            h += `<div class="sec-title">💡 운영 상황 진단 및 솔루션 가이드 (Updated)</div>
            <div style="padding:14px;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.12);border-radius:12px;font-size:11px;line-height:1.7">
                <div style="margin-bottom:10px">
                    <strong style="color:var(--warning)">CASE A. 회전율은 높으나 업무 강도 보통 (🟡/🟢)</strong><br>
                    • <span style="color:var(--text)">진단:</span> 조리 인력은 적정하나 **식당 공간/좌석이 부족**한 상태입니다.<br>
                    • <span style="color:var(--accent)">솔루션:</span> 인원 충원보다는 **T/O(도시락 형태) 비율을 확대** 권장합니다.
                </div>
                <div style="margin-bottom:10px">
                    <strong style="color:var(--danger)">CASE B. 회전율도 높고 업무 강도도 높음 (🔴)</strong><br>
                    • <span style="color:var(--text)">진단:</span> 공간도 부족하고 **주방 일손도 한계치**에 도달한 위험 상태입니다.<br>
                    • <span style="color:var(--accent)">솔루션:</span> **신규 인원 충원**, **지원 인력 투입** 또는 **제공 품목수(반찬 등) 축소**가 시급히 필요합니다.
                </div>
                <div>
                    <strong style="color:var(--primary)">CASE C. T/O 코너당 처리량 과다 (분석용)</strong><br>
                    • <span style="color:var(--text)">진단:</span> T/O 코너당 배식량이 한계치를 초과하여 **대기 동선 지연**이 우려됩니다.<br>
                    • <span style="color:var(--accent)">솔루션:</span> T/O 제공 품목 단순화 또는 무인 배식대(셀프 코너) 추가 배치 검토.
                </div>
            </div>`;

            h += `<div class="note-box"><strong>📝 산출 기준 및 해석</strong><br/><br/>
            <strong>• 업무 강도</strong> = 일일 총식수 ÷ 총 투입인원<br/>
            <span class="formula">→ 🟢 80미만 양호 · 🟡 95미만 주의 · 🔴 95이상 과부하(옵션: 품목수 축소 검토)</span><br/><br/>
            <strong>• 회전율(RI)</strong> = (중식 D/I 식수 + 할인된 TO식수) ÷ 좌석수<br/>
            <span class="formula">→ 🔴 3.5회 이상: 공간 과부하 (T/O 확대 집중)</span></div>`;

            ct.innerHTML = h;
            document.getElementById("ov").style.display = "flex";
        };

        /* ===== 비밀번호 변경 ===== */
        window.openPwChange = function () {
            const modal = document.getElementById("pw-modal");
            document.getElementById("pw-cur").value = "";
            document.getElementById("pw-new").value = "";
            document.getElementById("pw-confirm").value = "";
            document.getElementById("pw-msg").textContent = "";
            modal.style.display = "flex";
            setTimeout(() => document.getElementById("pw-cur").focus(), 100);
        };
        window.submitPwChange = async function () {
            const msg = document.getElementById("pw-msg");
            const cur = document.getElementById("pw-cur").value;
            const nw = document.getElementById("pw-new").value;
            const conf = document.getElementById("pw-confirm").value;
            if (!cur) { msg.style.color = "var(--danger)"; msg.textContent = "현재 비밀번호를 입력하세요."; return; }
            if (!nw || nw.length < 4) { msg.style.color = "var(--danger)"; msg.textContent = "새 비밀번호는 4자 이상이어야 합니다."; return; }
            if (nw !== conf) { msg.style.color = "var(--danger)"; msg.textContent = "새 비밀번호가 일치하지 않습니다."; return; }
            msg.style.color = "var(--dim)"; msg.textContent = "변경 중...";
            try {
                const r = await fetch(API, { method: "POST", redirect: "follow", body: JSON.stringify({ action: "changePw", userId: USER, currentPw: cur, newPw: nw }) });
                const d = await r.json();
                if (d.ok) {
                    msg.style.color = "var(--success)"; msg.textContent = "✅ 비밀번호가 변경되었습니다!";
                    setTimeout(() => document.getElementById("pw-modal").style.display = "none", 1500);
                } else {
                    const errMap = { wrong_current_pw: "현재 비밀번호가 올바르지 않습니다.", weak_new_pw: "새 비밀번호는 4자 이상이어야 합니다.", user_not_found: "계정을 찾을 수 없습니다." };
                    msg.style.color = "var(--danger)"; msg.textContent = errMap[d.error] || "오류: " + d.error;
                }
            } catch (e) { msg.style.color = "var(--warning)"; msg.textContent = "통신 오류: " + e.message; }
        };

        /* ===== window.onload (v3.7: localStorage 세션 복원 + sessionLog) ===== */
        window.onload = function () {
            try { const saved = localStorage.getItem("WS_ID"); if (saved) { document.getElementById("loginId").value = saved; document.getElementById("loginId").closest('.login-field').style.opacity = '0.7'; document.getElementById("save-id-label").textContent = "저장됨 ✓"; document.getElementById("save-id-btn").textContent = "저장 해제"; document.getElementById("save-id-btn").style.color = "var(--accent)"; document.getElementById("save-id-btn").style.borderColor = "rgba(56,189,248,.3)"; document.getElementById("loginPw").focus(); } } catch (e) { }
            try {
                /* 보안 정책: 저장된 인증정보로 자동 입장 금지 */
                sessionStorage.removeItem("WS");
                sessionStorage.removeItem("WTK");
                sessionStorage.removeItem("WR");
                sessionStorage.removeItem("WRG");
                sessionStorage.removeItem("WST");
                localStorage.removeItem("WS");
                localStorage.removeItem("WTK");
                localStorage.removeItem("WR");
                localStorage.removeItem("WRG");
                localStorage.removeItem("WST");
                document.getElementById("login-overlay").style.display = "flex";
            } catch (e) { }
        };

        window.toggleSaveId = function () { try { const saved = localStorage.getItem("WS_ID"), btn = document.getElementById("save-id-btn"), lbl = document.getElementById("save-id-label"), idInput = document.getElementById("loginId"); if (saved) { localStorage.removeItem("WS_ID"); idInput.value = ""; idInput.closest('.login-field').style.opacity = '1'; idInput.disabled = false; lbl.textContent = ""; btn.textContent = "아이디 저장"; btn.style.color = "var(--muted)"; btn.style.borderColor = "var(--border)"; idInput.focus(); } else { const id = idInput.value.trim(); if (!id) { idInput.focus(); return; } localStorage.setItem("WS_ID", id); lbl.textContent = "저장됨 ✓"; btn.textContent = "저장 해제"; btn.style.color = "var(--accent)"; btn.style.borderColor = "rgba(56,189,248,.3)"; idInput.closest('.login-field').style.opacity = '0.7'; document.getElementById("loginPw").focus(); } } catch (e) { const lbl = document.getElementById("save-id-label"); if (lbl) lbl.textContent = "⚠️ 저장 불가"; setTimeout(function () { if (lbl) lbl.textContent = ""; }, 2000); } };

        /* ===== 보안 모듈 (기존 그대로) ===== */
        function initSecurity(userId) { function buildWatermark(uid) { const cvs = document.createElement('canvas'); cvs.width = 340; cvs.height = 160; const ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, cvs.width, cvs.height); ctx.save(); ctx.translate(cvs.width / 2, cvs.height / 2); ctx.rotate(-Math.PI / 7); ctx.globalAlpha = 0.055; ctx.fillStyle = '#ffffff'; ctx.font = '700 15px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('Samsung Welstory', 0, -18); ctx.font = '600 13px Inter, sans-serif'; ctx.fillText(uid + '@samsung.com', 0, 4); ctx.font = '500 11px Inter, sans-serif'; ctx.fillText(new Date().toLocaleDateString('ko-KR'), 0, 22); ctx.restore(); return cvs.toDataURL('image/png'); } const wmDiv = document.createElement('div'); wmDiv.id = 'wm-overlay'; wmDiv.style.cssText = `position:fixed;inset:0;z-index:99998;pointer-events:none;user-select:none;background-image:url(${buildWatermark(userId)});background-repeat:repeat;background-size:340px 160px;opacity:1;`; document.body.appendChild(wmDiv); const blurShield = document.createElement('div'); blurShield.id = 'blur-shield'; blurShield.style.cssText = `display:none;position:fixed;inset:0;z-index:99997;background:rgba(10,15,30,0.97);backdrop-filter:blur(20px);justify-content:center;align-items:center;flex-direction:column;gap:12px;pointer-events:all;`; blurShield.innerHTML = `<div style="font-size:48px;">🔒</div><div style="color:#f1f5f9;font-size:18px;font-weight:900;letter-spacing:-.5px">화면 보호 중</div><div style="color:#64748b;font-size:13px;text-align:center;line-height:1.6">화면 공유 또는 캡처 감지됨<br/>이 창을 다시 클릭하면 해제됩니다</div>`; document.body.appendChild(blurShield); function showShield() { if (!secReady) return; blurShield.style.display = 'flex'; } function hideShield() { blurShield.style.display = 'none'; } blurShield.addEventListener('click', hideShield); var secReady = false; setTimeout(function () { secReady = true; }, 5000); document.addEventListener('visibilitychange', () => { if (document.hidden) showShield(); else setTimeout(hideShield, 1200); }); if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) { const origGDM = navigator.mediaDevices.getDisplayMedia.bind(navigator.mediaDevices); navigator.mediaDevices.getDisplayMedia = async function (...args) { showShield(); const stream = await origGDM(...args); stream.getTracks().forEach(t => t.addEventListener('ended', hideShield)); return stream; }; } document.addEventListener("keydown", e => { const k = e.key.toLowerCase(); if (e.key === 'PrintScreen') { e.preventDefault(); showShield(); setTimeout(hideShield, 2000); return; } if (e.key === 'F12') { e.preventDefault(); return; } if (e.ctrlKey || e.metaKey) { const blocked = ['c', 'a', 'u', 's', 'p', 'x', 'f', 'g', 'e', 'h', 'r', 'l', 'd', 'n', 't', 'w', 'j']; if (blocked.includes(k)) { e.preventDefault(); return; } if (e.shiftKey && ['i', 'j', 'c', 'k', 'm', 'p', 'e'].includes(k)) { e.preventDefault(); return; } } }, true); document.addEventListener("contextmenu", e => e.preventDefault(), true); document.addEventListener("dragstart", e => e.preventDefault(), true); document.addEventListener("selectstart", e => { if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) e.preventDefault(); }, true); const noSelectStyle = document.createElement('style'); noSelectStyle.textContent = `body,.card,.tbl-wrap,.stats-row,.staff-panel,header,main{-webkit-user-select:none!important;-moz-user-select:none!important;user-select:none!important;}input,textarea,select{-webkit-user-select:text!important;user-select:text!important;}`; document.head.appendChild(noSelectStyle); let devToolsOpen = false; setInterval(() => { const threshold = 160; if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) { if (!devToolsOpen) { devToolsOpen = true; showShield(); blurShield.innerHTML = `<div style="font-size:48px;">⚠️</div><div style="color:#f87171;font-size:18px;font-weight:900">개발자 도구 감지</div><div style="color:#64748b;font-size:13px;text-align:center;line-height:1.6">보안 정책에 의해 접근이 제한됩니다<br/><span id="dev-countdown" style="color:#fbbf24;font-weight:700">5초 후 로그아웃...</span></div>`; let countdown = 5; const timer = setInterval(() => { countdown--; const el = document.getElementById('dev-countdown'); if (el) el.textContent = `${countdown}초 후 로그아웃...`; if (countdown <= 0) { clearInterval(timer); sessionStorage.clear(); location.reload(); } }, 1000); } } else { devToolsOpen = false; } }, 1000); console.log('%c🔐 보안 시스템 활성화됨', 'color:#f87171;font-size:16px;font-weight:bold'); }
    </script>
