<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Samsung Welstory Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.46.0/dist/apexcharts.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --card: rgba(17, 24, 39, .85);
            --card-hover: rgba(23, 32, 52, .9);
            --border: rgba(148, 163, 184, .08);
            --border-hover: rgba(56, 189, 248, .2);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --accent3: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --text: #f1f5f9;
            --muted: #64748b;
            --dim: #475569;
            --r: 16px;
            --r2: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, .4);
            --glow: 0 0 20px rgba(56, 189, 248, .08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden
        }

        input,
        textarea,
        select,
        button {
            font-family: inherit;
            user-select: auto !important;
            -webkit-user-select: auto !important
        }

        /* ===== LOGIN ===== */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000
        }

        .login-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(56, 189, 248, .06), transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(129, 140, 248, .04), transparent 50%)
        }

        .login-card {
            position: relative;
            background: linear-gradient(145deg, rgba(17, 24, 39, .9), rgba(15, 23, 42, .95));
            padding: 48px 32px 36px;
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, .06);
            width: 88%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5), var(--glow)
        }

        .login-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 8px 24px rgba(56, 189, 248, .2)
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -.5px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .login-card p {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5
        }

        .login-field {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, .03);
            border: 1.5px solid rgba(148, 163, 184, .1);
            border-radius: 14px;
            margin-bottom: 10px;
            height: 50px;
            padding: 0 16px;
            transition: all .3s
        }

        .login-field:focus-within {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .04);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, .08)
        }

        .login-field input {
            flex: 1;
            min-width: 0;
            height: 100%;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            outline: none
        }

        .login-field input::placeholder {
            color: var(--dim);
            font-weight: 600
        }

        .domain-tag {
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            opacity: .7;
            flex-shrink: 0;
            white-space: nowrap
        }

        #loginPw {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            background: rgba(255, 255, 255, .03);
            border: 1.5px solid rgba(148, 163, 184, .1);
            border-radius: 14px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 700;
            outline: none;
            transition: all .3s
        }

        #loginPw:focus {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .04);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, .08)
        }

        #loginPw::placeholder {
            color: var(--dim);
            font-weight: 600
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: -.3px;
            box-shadow: 0 4px 16px rgba(56, 189, 248, .25);
            transition: all .2s
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(56, 189, 248, .35)
        }

        .login-btn:disabled {
            opacity: .4;
            transform: none;
            cursor: not-allowed
        }

        #login-error {
            color: var(--danger);
            font-size: 12px;
            margin-top: 14px;
            font-weight: 700;
            display: none;
            line-height: 1.5;
            background: rgba(248, 113, 113, .06);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(248, 113, 113, .1);
            width: 100%;
            text-align: left
        }

        /* ===== SPLASH ===== */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000
        }

        .sp-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, .06);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* ===== DASHBOARD ===== */
        #dashboard {
            display: none;
            opacity: 0;
            flex-direction: column;
            width: 100%;
            overflow-y: auto;
            transition: opacity .4s
        }

        header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(10, 15, 30, .92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px) saturate(1.2);
            padding: env(safe-area-inset-top, 12px) 20px 14px
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 8px;
            min-width: 0
        }

        .header-top>div:first-child {
            min-width: 0;
            flex: 1 1 0;
            overflow: hidden
        }

        .header-top h1 {
            font-size: clamp(12px, 3.8vw, 18px);
            font-weight: 900;
            letter-spacing: -.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #lastUpdate {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-top: 3px
        }

        #role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            margin-top: 4px;
            border: 1px solid
        }

        .hdr-btns {
            display: flex;
            gap: 6px
        }

        .hdr-btn {
            height: 34px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .hdr-btn:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, .06)
        }

        .hdr-btn.accent {
            border-color: rgba(56, 189, 248, .2);
            color: var(--accent)
        }

        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px
        }

        .filter-row::-webkit-scrollbar {
            display: none
        }

        .chip {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(148, 163, 184, .1);
            background: rgba(255, 255, 255, .02);
            color: var(--dim);
            font-weight: 800;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all .25s
        }

        .chip:hover {
            border-color: rgba(56, 189, 248, .3);
            color: var(--text)
        }

        .chip.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(56, 189, 248, .2)
        }

        main {
            padding: 16px;
            display: grid;
            gap: 14px;
            max-width: 580px;
            margin: 0 auto;
            width: 100%
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: border-color .3s
        }

        .card:hover {
            border-color: var(--border-hover)
        }

        .card-inner {
            padding: 20px
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px
        }

        .region-tag {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 5px;
            opacity: .8
        }

        .site-name {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -.5px;
            line-height: 1.2
        }

        .total-badge {
            text-align: right
        }

        .total-badge .label {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 3px
        }

        .total-badge .val {
            font-size: 20px;
            font-weight: 900;
            color: var(--success)
        }

        @keyframes blink {
            0% { opacity: 1 }
            50% { opacity: .2 }
            100% { opacity: 1 }
        }

        .led-red {
            display: inline-block;
            font-size: 11px;
            margin-left: 6px;
            animation: blink 1s infinite;
            text-shadow: 0 0 8px rgba(248, 113, 113, .8)
        }

        .alert-banner {
            background: rgba(248, 113, 113, .12);
            border-bottom: 1px solid rgba(248, 113, 113, .2);
            color: var(--danger);
            font-size: 11px;
            font-weight: 900;
            padding: 7px 16px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap
        }

        .marquee-content {
            display: inline-block;
            animation: marquee 18s linear infinite
        }

        @keyframes marquee {
            0% { transform: translateX(100vw) }
            100% { transform: translateX(-100%) }
        }

        .alert-banner.warn {
            background: rgba(251, 191, 36, .08);
            border-bottom-color: rgba(251, 191, 36, .2);
            color: var(--warning)
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px
        }

        .sbox {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 12px 8px;
            text-align: center;
            position: relative;
            transition: border-color .2s
        }

        .sbox:hover { border-color: rgba(255, 255, 255, .12) }

        .sbox .lb {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 5px;
            display: block
        }

        .sbox .vl {
            font-size: 16px;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block
        }

        .edit-sm {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 10px;
            opacity: .3;
            transition: opacity .2s;
            padding: 2px
        }

        .edit-sm:hover { opacity: 1 }

        .staff-panel {
            background: linear-gradient(135deg, rgba(56, 189, 248, .04), rgba(129, 140, 248, .03));
            border: 1px solid rgba(56, 189, 248, .08);
            border-radius: var(--r2);
            padding: 12px;
            margin-bottom: 14px;
            position: relative
        }

        .staff-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            gap: 4px
        }

        .staff-grid .lb {
            font-size: 10px;
            color: var(--dim);
            font-weight: 700;
            margin-bottom: 3px
        }

        .staff-grid .vl { font-size: 16px; font-weight: 900 }

        .edit-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all .2s
        }

        .edit-icon:hover {
            background: rgba(56, 189, 248, .1);
            border-color: var(--accent)
        }

        .monthly-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 12px;
            padding: 7px 12px;
            background: rgba(255, 255, 255, .02);
            border-radius: 10px;
            border: 1px dashed var(--border);
        }

        .mb-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--dim);
            white-space: nowrap;
        }

        .mb-val { color: var(--text) }

        .mb-pct {
            font-weight: 900;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .mb-pct.up { color: var(--success); background: rgba(52, 211, 153, .1) }
        .mb-pct.down { color: var(--danger); background: rgba(248, 113, 113, .1) }
        .mb-split { color: var(--border); font-size: 10px }

        .tbl-wrap {
            background: rgba(0, 0, 0, .25);
            border-radius: var(--r2);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 14px
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px }

        th {
            padding: 10px 8px;
            text-align: right;
            color: var(--dim);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, .01)
        }

        td {
            padding: 9px 8px;
            text-align: right;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-weight: 700
        }

        td:first-child, th:first-child { text-align: left }
        td:first-child { color: var(--accent); font-weight: 800 }

        .row-sum td {
            background: rgba(52, 211, 153, .04);
            font-weight: 900;
            color: var(--success) !important
        }

        .btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px
        }

        .mbtn {
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02);
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s
        }

        .mbtn:hover {
            border-color: rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .05)
        }

        .mbtn.pri {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            box-shadow: 0 2px 8px rgba(56, 189, 248, .15)
        }

        .mbtn.pri:hover { box-shadow: 0 4px 16px rgba(56, 189, 248, .25) }

        .ipanel {
            display: none;
            margin-top: 14px;
            padding: 18px;
            background: rgba(10, 15, 30, .7);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            animation: slideIn .25s ease-out;
            overflow: hidden;
            max-width: 100%;
            box-sizing: border-box
        }

        .ipanel.show { display: block }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px) }
            to { opacity: 1; transform: translateY(0) }
        }

        .sec-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--accent);
            margin: 18px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            letter-spacing: .3px
        }

        .sec-title:first-child { margin-top: 0 }

        .fg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px
        }

        .fg.c4 { grid-template-columns: 1fr 1fr 1fr 1fr }

        @media(max-width:400px) {
            .fg.c4 { grid-template-columns: 1fr 1fr }
        }

        .ff { display: flex; flex-direction: column; gap: 3px }
        .ff label { font-size: 10px; color: var(--dim); font-weight: 700 }

        .ff input,
        .ff textarea {
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            outline: none;
            transition: border-color .2s;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            min-width: 0
        }

        .ff input:focus, .ff textarea:focus { border-color: var(--accent) }
        .ff textarea { resize: none; height: 56px }

        .sv-btn {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: none;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
            letter-spacing: -.2px
        }

        .sv-btn.green {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            box-shadow: 0 2px 10px rgba(52, 211, 153, .2)
        }

        .sv-btn.blue {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 2px 10px rgba(56, 189, 248, .15)
        }

        .sv-btn:disabled { opacity: .4 }

        .sv-msg {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 800
        }

        .ov {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 30, .85);
            backdrop-filter: blur(12px);
            z-index: 1500;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px
        }

        .ov-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 540px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5)
        }

        .ov-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px
        }

        .ov-hdr h3 { font-size: 16px; font-weight: 900; letter-spacing: -.3px }

        .cls-btn {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s
        }

        .cls-btn:hover { border-color: var(--accent); color: var(--accent) }

        .ch-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px }

        .ch-name {
            width: 48px;
            text-align: right;
            font-size: 11px;
            font-weight: 800;
            flex-shrink: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted)
        }

        .ch-track {
            flex: 1;
            height: 24px;
            background: rgba(255, 255, 255, .03);
            border-radius: 6px;
            overflow: hidden;
            position: relative
        }

        .ch-fill {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .4);
            min-width: 28px;
            transition: width .6s ease-out
        }

        .ch-dual { display: flex; gap: 3px; margin-bottom: 3px }
        .ch-dual .ch-track { height: 18px }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 900
        }

        .note-box {
            background: linear-gradient(135deg, rgba(56, 189, 248, .03), rgba(129, 140, 248, .02));
            border: 1px solid rgba(56, 189, 248, .08);
            border-radius: var(--r2);
            padding: 16px;
            margin-top: 16px;
            font-size: 11px;
            color: var(--muted);

    </div>


    <script>
        /* =====================================================
           ★ 전역 상수 & 권한 변수
        ===================================================== */
        const API = "https://script.google.com/macros/s/AKfycbxwJIGmBlO-bNYlwGpibBmP4cyBDYvGbpP9hWTxSabgNBGdUL5Ap24v1XqHVtscKgyk/exec";

        const RM = {
            "a": "사업장명", "b": "지역",
            "c1": "영양사", "c2": "조리사", "c3": "웰프로_주", "c4": "웰프로_야",
            "d1": "좌석수", "d2": "코너수", "d3": "TO_코너수",
            "e1": "DI_조식", "e2": "DI_중식", "e3": "DI_석식", "e4": "DI_야식",
            "f1": "TO_조식", "f2": "TO_중식", "f3": "TO_석식", "f4": "TO_야식",
            "e5": "DI_조식(주말)", "e6": "DI_중식(주말)", "e7": "DI_석식(주말)", "e8": "DI_야식(주말)",
            "f5": "TO_조식(주말)", "f6": "TO_중식(주말)", "f7": "TO_석식(주말)", "f8": "TO_야식(주말)",
            "g1": "회전율(중식_T/O포함)", "g2": "회전율(중식_T/O제외)",
            "h1": "도전매출", "h2": "도전영업이익", "h3": "목표재료비",
            "m1": "금월_평균중식", "m2": "전월대비", "m3": "조업일수"
        };
        function deobf(arr) { return arr.map(row => { const o = {}; Object.keys(row).forEach(k => { o[RM[k] || k] = row[k] }); return o }); }

        let D = [], USER = null, TK = null, REG = "ALL";
        let USER_ROLE = 'C';
        let USER_REGION = '';
        let USER_SITE = '';
        let OV = JSON.parse(sessionStorage.getItem("OV") || "{}");

        let _gasPerfCache = null;
        let _gasPerfLoading = false;
        let _gasPerfLoaded = false;

        function so() { sessionStorage.setItem("OV", JSON.stringify(OV)); }
        function n(v) { if (v == null) return 0; const t = String(v).trim(); if (!t || t === "-") return 0; const x = parseFloat(t.replace(/[^0-9.-]/g, '')); return isFinite(x) ? x : 0; }
        function f(v) { const x = n(v); return x === 0 ? "-" : x.toLocaleString(); }
        function rc(v) { return v >= 3.5 ? "var(--danger)" : v >= 2.5 ? "var(--warning)" : "var(--success)"; }
        function ov(sn, k, fb) { return (OV[sn] && OV[sn][k] != null) ? Number(OV[sn][k]) : fb; }
        function gSt(d) { const sn = d["사업장명"]; return ov(sn, "영양사", n(d["영양사"])) + ov(sn, "조리사", n(d["조리사"])) + ov(sn, "웰프로_주", n(d["웰프로_주"])) + ov(sn, "웰프로_야", n(d["웰프로_야"])); }
        function gMS(sn, m) { const o = OV[sn]; if (o && o[m + "_평일"] > 0) return Number(o[m + "_평일"]); const d = D.find(x => x["사업장명"] === sn); return d ? gSt(d) : 1; }
        function gSeats(d) { return ov(d["사업장명"], "좌석수", n(d["좌석수"])); }
        function inten(d) { const st = gSt(d) || 1, tm = ["조식", "중식", "석식", "야식"].reduce((a, m) => a + n(d["DI_" + m]) + n(d["TO_" + m]), 0); return { s: tm / st, tm, st }; }
        function iLb(s) { if (s >= 95) return { t: "과부하", e: "🔴", c: "var(--danger)", b: "rgba(248,113,113,.1)" }; if (s >= 80) return { t: "주의", e: "🟡", c: "var(--warning)", b: "rgba(251,191,36,.1)" }; return { t: "양호", e: "🟢", c: "var(--success)", b: "rgba(52,211,153,.1)" }; }

        /* =====================================================
           ★ 권한별 UI 제어
        ===================================================== */
        const ROLE_LABEL = { M: "마스터", A: "지역장", B: "PM", C: "담당자", S: "스탭" };
        const ROLE_COLOR = { M: "#f87171", A: "#fbbf24", B: "#38bdf8", C: "#34d399", S: "#818cf8" };

        function applyRoleUI() {
            const titleEl = document.getElementById("main-title");
            if (USER_ROLE === "M") titleEl.textContent = "전체 사업장 현황";
            else if (USER_ROLE === "A" || USER_ROLE === "B") titleEl.textContent = `${USER_REGION} 사업장 현황`;
            else titleEl.textContent = USER_SITE || "내 사업장 현황";

            const badge = document.getElementById("role-badge");
            const col = ROLE_COLOR[USER_ROLE] || "#64748b";
            const lbl = ROLE_LABEL[USER_ROLE] || USER_ROLE;
            badge.style.cssText = `display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-top:4px;border:1px solid ${col}40;color:${col};background:${col}12`;
            badge.textContent = `● ${lbl}`;

            const canReport = ["M", "A", "B"].includes(USER_ROLE);
            const canExport = ["M", "A"].includes(USER_ROLE);

            document.getElementById("trend-btn").style.display = canReport ? "flex" : "none";
            document.getElementById("export-btn").style.display = canExport ? "flex" : "none";
            document.getElementById("copy-btn").style.display = canExport ? "flex" : "none";
        }

        /* =====================================================
           ★ 공휴일 / 징검다리 판단
        ===================================================== */
        const KOR_HOLIDAYS_BY_YEAR = {
            2026: [
                "2026-01-01",
                "2026-02-16", "2026-02-17", "2026-02-18",
                "2026-03-01", "2026-03-02",
                "2026-05-05",
                "2026-05-24", "2026-05-25",
                "2026-06-03",
                "2026-06-06",
                "2026-08-15", "2026-08-17",
                "2026-09-24", "2026-09-25", "2026-09-26",
                "2026-10-03", "2026-10-05",
                "2026-10-09",
                "2026-12-25"
            ]
        };

        function _toYMD(d) {
            const x = (d instanceof Date) ? d : new Date(d);
            if (isNaN(x.getTime())) return "";
            return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
        }
        function _isWeekend(ymd) { const d = new Date(ymd + "T00:00:00"); return (d.getDay() === 0 || d.getDay() === 6); }
        function _isHoliday(ymd) { const y = Number(String(ymd).slice(0,4)); return (KOR_HOLIDAYS_BY_YEAR[y]||[]).includes(ymd); }
        function getHolidayType(ymd) {
            if (!ymd) return { type: "workday", label: "평일" };
            if (_isWeekend(ymd)) return { type: "weekend", label: "주말" };
            if (_isHoliday(ymd)) return { type: "holiday", label: "공휴일" };
            const d = new Date(ymd + "T00:00:00");
            const prev = new Date(d); prev.setDate(d.getDate()-1);
            const next = new Date(d); next.setDate(d.getDate()+1);
            const isOff = s => _isWeekend(s) || _isHoliday(s);
            if (isOff(_toYMD(prev)) && isOff(_toYMD(next))) return { type: "sandwich", label: "징검다리" };
            return { type: "workday", label: "평일" };
        }

        /* =====================================================
           ★ 알림 트리거
        ===================================================== */
        function getAlertStatus(sn) {
            const recs = getRec().filter(r => r.siteName === sn).sort((a, b) => a.date > b.date ? -1 : 1);
            const d = D.find(x => x["사업장명"] === sn);
            let trigger = false, level = "warn", msg = "";

            if (!trigger && recs.length >= 3) {
                const todayStr = recs[0].date;
                const dayInfo = getHolidayType(todayStr);
                const vals = recs.slice(1, 6).map(r => (r.DI_중식 || 0) + (r.TO_중식 || 0));
                const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
                const today = (recs[0].DI_중식 || 0) + (recs[0].TO_중식 || 0);
                if (avg > 0) {
                    const chg = (today - avg) / avg * 100;
                    if (Math.abs(chg) >= 15) {
                        trigger = true;
                        level = chg > 0 ? "warn" : "danger";
                        msg = chg > 0
                            ? `📈 중식 급증 감지 (+${chg.toFixed(0)}%) — 식재료 발주 점검 요망`
                            : `📉 중식 급감 감지 (${chg.toFixed(0)}%) — 원인 분석 필요`;
                        if (chg < 0 && (dayInfo.type === "sandwich" || dayInfo.type === "holiday" || dayInfo.type === "weekend")) {
                            level = "warn";
                            const tag = dayInfo.type === "sandwich" ? "징검다리" : dayInfo.label;
                            msg = `📉 중식 감소 감지 (${chg.toFixed(0)}%) — ${tag} 영향 추정`;
                        }
                    }
                }
            }
            return { trigger, level, msg };
        }

        /* =====================================================
           ★ LOGIN
        ===================================================== */
        window.doLogin = async function () {
            const err = document.getElementById("login-error"); err.style.display = "none";
            const id = document.getElementById("loginId").value.trim(), pw = document.getElementById("loginPw").value, btn = document.querySelector(".login-btn");
            if (!id || !pw) { err.innerText = "아이디와 비밀번호를 입력하세요."; err.style.display = "block"; return; }
            btn.innerText = "접속 중..."; btn.disabled = true;
            try {
                const r = await fetch(API + "?type=login&userId=" + encodeURIComponent(id) + "&pw=" + encodeURIComponent(pw), { redirect: "follow" });
                const t = await r.text();
                if (t.startsWith("Valid")) {
                    const parts = t.split("|");
                    USER = id; TK = parts[1] || null;
                    USER_ROLE = parts[2] || "C";
                    USER_REGION = parts[3] || "";
                    USER_SITE = parts[4] || "";
                    try {
                        sessionStorage.setItem("WS", id);
                        if (TK) sessionStorage.setItem("WTK", TK);
                        sessionStorage.setItem("WR", USER_ROLE);
                        sessionStorage.setItem("WRG", USER_REGION);
                        sessionStorage.setItem("WST", USER_SITE);
                    } catch (e) { }
                    document.getElementById("login-overlay").style.display = "none";
                    applyRoleUI();
                    init();
                    setTimeout(() => initSecurity(id), 500);
                } else {
                    err.innerText = t === "NoPermission" ? "등록되지 않은 계정입니다." : "비밀번호가 올바르지 않습니다.";
                    err.style.display = "block";
                }
            } catch (e) { err.innerText = "통신 오류: " + e.message; err.style.display = "block"; }
            btn.innerText = "로그인"; btn.disabled = false;
        };

        /* =====================================================
           ★ DATA LOAD
        ===================================================== */
        async function init() {
            const sp = document.getElementById("splash"), db = document.getElementById("dashboard");
            const cachedData = localStorage.getItem("WS_D_CACHE");
            if (cachedData) {
                try {
                    D = JSON.parse(cachedData);
                    const now = new Date();
                    document.getElementById("lastUpdate").innerText = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")} 캐시 로드됨`;
                    sp.style.display = "none";
                    db.style.display = "flex";
                    db.style.opacity = "1";
                    chips(); render();
                } catch (e) { }
            } else {
                sp.style.display = "flex";
            }

            try {
                const url = TK ? API + "?tk=" + TK : API + "?pw=" + encodeURIComponent(document.getElementById("loginPw").value);
                const r = await fetch(url, { redirect: "follow" });
                const raw = await r.json();
                if (raw.error) throw new Error(raw.error);

                if (raw.data) {
                    D = deobf(raw.data);
                    if (!USER_ROLE || USER_ROLE === "C") { USER_ROLE = raw.role || "C"; USER_REGION = raw.region || ""; USER_SITE = raw.site || ""; }
                } else {
                    D = deobf(raw || []);
                }
                localStorage.setItem("WS_D_CACHE", JSON.stringify(D));
                applyRoleUI();
                chips(); render();
                const now = new Date();
                document.getElementById("lastUpdate").innerText = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")} 업데이트`;
                sp.style.opacity = "0";
                setTimeout(() => { sp.style.display = "none"; db.style.display = "flex"; db.style.opacity = "1"; }, 400);
            } catch (e) {
                if (!D.length) {
                    sp.style.display = "none"; db.style.display = "flex"; db.style.opacity = "1";
                    document.getElementById("grid").innerHTML = `<div style="padding:50px 20px;text-align:center"><div style="font-size:36px;margin-bottom:16px">⚠️</div><p style="color:var(--muted);font-size:14px;margin-bottom:20px">${e.message}</p><button class="sv-btn blue" style="width:auto;padding:0 32px" onclick="location.reload()">다시 시도</button></div>`;
                }
            }
        }

        /* =====================================================
           ★ CHIPS & RENDER
        ===================================================== */
        function chips() {
            const rg = [...new Set(D.map(d => d["지역"]))].filter(Boolean);
            const showChips = ["M", "A", "B"].includes(USER_ROLE);
            document.getElementById("chips").innerHTML = showChips
                ? [{ v: "ALL", l: "전체" }, ...rg.map(r => ({ v: r, l: r }))].map(c => `<button class="chip ${REG === c.v ? " active" : ""}" onclick="setR('${c.v}')">${c.l}</button>`).join("")
                : "";
        }
        window.setR = function (r) { REG = r; chips(); render(); };

        function render() {
            const g = document.getElementById("grid");
            const fd = D.filter(d => REG === "ALL" || d["지역"] === REG);
            const canReport = ["M", "A", "B"].includes(USER_ROLE);
            document.getElementById("rpt-btn").style.display = (canReport && REG !== "ALL") ? "flex" : "none";

            g.innerHTML = fd.map((d, i) => {
                const sn = d["사업장명"], rg = d["지역"], u = sn.replace(/[^a-zA-Z0-9가-힣]/g, '') + '_' + i;
                const gS = m => n(d["DI_" + m]) + n(d["TO_" + m]);
                const st = gSt(d);
                const seats = n(d["좌석수"]);
                const seats_v = seats || 1;
                const diMid = n(d["DI_중식"]);
                const toMid = n(d["TO_중식"]);
                const corners = n(d["코너수"]) || 1;
                const toCorners_v = n(d["TO_코너수"]) || corners || 1;

                const ri_raw = n(d["회전율(중식_T/O포함)"]);
                const re_raw = n(d["회전율(중식_T/O제외)"]);
                const re = re_raw > 0 ? re_raw : (diMid / seats_v);
                const ri = ri_raw > 0 ? ri_raw : ((diMid + (toMid / toCorners_v)) / seats_v);
                const reAuto = re_raw === 0 && seats_v > 0 && diMid > 0, riAuto = ri_raw === 0 && seats_v > 0 && (diMid + toMid) > 0;
                const o = OV[sn] || {}, meals = ["조식", "중식", "석식", "야식"];
                let gR = ''; meals.forEach(m => { const di = n(d["DI_" + m]), to = n(d["TO_" + m]), tot = di + to, ms = gMS(sn, m), ps = (tot / ms).toFixed(1); gR += `<tr><td>${m}</td><td>${f(di)}</td><td>${f(to)}</td><td>${f(tot)}</td><td>${ms}</td><td style="color:var(--accent);font-weight:900">${ps}</td></tr>`; });
                const rS = D.filter(x => x["지역"] === rg), mxL = Math.max(...rS.map(x => n(x["DI_중식"]) + n(x["TO_중식"])));
                let cB = ''; if (rS.length > 1) { cB = `<div class="sec-title">📊 ${rg} 중식 비교</div>`; rS.forEach(r => { const l = n(r["DI_중식"]) + n(r["TO_중식"]), p = mxL > 0 ? (l / mxL * 100) : 0, c = r["사업장명"] === sn; cB += `<div class="ch-bar"><div class="ch-name" style="${c ? 'color:var(--accent)' : ''}">${r["사업장명"]}</div><div class="ch-track"><div class="ch-fill" style="width:${p}%;background:${c ? 'linear-gradient(90deg,var(--accent),var(--accent2))' : 'rgba(100,116,139,.4)'}">${f(l)}</div></div></div>`; }); }
                const eF = meals.map(m => `<div class="ff"><label>${m} 평일</label><input type="number" id="ov_${u}_${m}_평일" value="${o[m + '_평일'] || ''}" placeholder="${st}"></div><div class="ff"><label>${m} 주말</label><input type="number" id="ov_${u}_${m}_주말" value="${o[m + '_주말'] || ''}" placeholder="${st}"></div>`).join('');

                const alert = getAlertStatus(sn);
                let alertBanner = '', ledDot = '';
                if (alert.trigger) {
                    if (["M", "A"].includes(USER_ROLE)) {
                        ledDot = `<span class="led-red" title="${alert.msg}">🔴</span>`;
                    } else {
                        const bCls = alert.level === "danger" ? "" : "warn";
                        alertBanner = `<div class="alert-banner ${bCls}"><div class="marquee-content">${alert.msg}</div></div>`;
                    }
                }

                const mAvg = n(d["금월_평균중식"]), mMom = n(d["전월대비"]);
                const momClass = mMom > 0 ? "up" : (mMom < 0 ? "down" : "");
                const momIcon = mMom > 0 ? "↑" : (mMom < 0 ? "↓" : "→");
                const canEdit = ["M", "A", "B"].includes(USER_ROLE);

                return `<div class="card">
            ${alertBanner}
            <div class="card-inner">
            <div class="card-header">
                <div>
                    <div class="region-tag">${rg}</div>
                    <div class="site-name">${sn} ${ledDot} <button class="emotion-btn" onclick="openCalForSite('${sn}')" title="데일리 식수 열람">📆</button></div>
                    <div class="monthly-bar">
                        <div class="mb-item"><span>📊 금월 평균</span><span class="mb-val">${mAvg > 0 ? f(mAvg) + '식' : '-'}</span></div>
                        <div class="mb-split">|</div>
                        <div class="mb-item"><span>전월대비</span><span class="mb-pct ${momClass}">${momIcon} ${Math.abs(mMom)}%</span></div>
                    </div>
                </div>
                <div class="total-badge"><div class="label">투입인원</div><div class="val">${st}<span style="font-size:12px;font-weight:700;opacity:.6">명</span></div></div>
            </div>
            <div class="stats-row">

        window.tp = function (u, t) { ['perf', 'wknd', 'goal', 'edit', 'seat'].forEach(p => { const e = document.getElementById(`p_${p}_${u}`); if (e) { if (p === t) e.classList.toggle('show'); else e.classList.remove('show'); } }); };
        window.svSeat = function (u, sn) { OV[sn] = OV[sn] || {};['좌석수', '코너수', 'TO_코너수'].forEach(k => { const v = document.getElementById(`ov_${u}_${k}`).value; if (v) OV[sn][k] = Number(v); else delete OV[sn][k]; }); so(); render(); };
        window.svEdit = function (u, sn) { OV[sn] = OV[sn] || {};['영양사', '조리사', '웰프로_주', '웰프로_야'].forEach(k => { const v = document.getElementById(`ov_${u}_${k}`).value; if (v) OV[sn][k] = Number(v); else delete OV[sn][k]; });["조식", "중식", "석식", "야식"].forEach(m => { ["평일", "주말", "실투입"].forEach(t => { const el = document.getElementById(`ov_${u}_${m}_${t}`); if (!el) return; const v = el.value; if (v) OV[sn][m + '_' + t] = Number(v); else delete OV[sn][m + '_' + t]; }); }); so(); render(); };
        window.svRec = function (u, sn, rg) { };
        window.toggleGoalEdit = function (u) { const keys = ['매출', '이익', '재료']; const hint = document.getElementById(`goal-edit-hint-${u}`); const isEditing = document.getElementById(`gi_매출_${u}`).style.display !== 'none'; keys.forEach(k => { const inp = document.getElementById(`gi_${k}_${u}`); const val = document.getElementById(`gv_${k}_${u}`); if (inp && val) { inp.style.display = isEditing ? 'none' : 'block'; val.style.display = isEditing ? 'block' : 'none'; } }); if (hint) hint.textContent = isEditing ? '📝 수치 터치 시 직접 수정 가능' : '✅ 수정 중 — 값 입력 후 다른 곳 터치'; };
        window.saveGoal = function (u, sn, key, val) { OV[sn] = OV[sn] || {}; const km = { '매출': 'goal_매출', '이익': 'goal_이익', '재료': 'goal_재료' }, cm = { '매출': 'var(--accent)', '이익': 'var(--success)', '재료': 'var(--warning)' }; if (val) { OV[sn][km[key]] = Number(val); const el = document.getElementById(`gv_${key}_${u}`); if (el) { el.style.color = cm[key]; el.textContent = Number(val).toLocaleString(); } } else { delete OV[sn][km[key]]; } so(); };
        window.updateIntensity = function (u, sn) { const d = D.find(x => x["사업장명"] === sn); if (!d) return; const meals = ["조식", "중식", "석식", "야식"]; let totalFood = 0, totalStaff = 0; meals.forEach(m => { const food = n(d["DI_" + m]) + n(d["TO_" + m]); totalFood += food; const el = document.getElementById(`ov_${u}_${m}_실투입`); const st = el && el.value ? Number(el.value) : gMS(sn, m); totalStaff += st; }); const avg = totalStaff > 0 ? totalFood / (totalStaff / meals.length) : 0; const pct = Math.min(avg / 130 * 100, 100); const col = avg >= 95 ? "var(--danger)" : avg >= 80 ? "var(--warning)" : "var(--success)"; const ib = document.getElementById(`ib_${u}`), iv = document.getElementById(`iv_${u}`); if (ib) { ib.style.width = pct + "%"; ib.style.background = col; } if (iv) { iv.style.color = col; iv.textContent = avg.toFixed(1) + "식/인"; } };

        /* ===== 누적 데이터 (localStorage) ===== */
        function getRec() { try { return JSON.parse(localStorage.getItem("WS_REC") || "[]") } catch (e) { return [] } }
        function saveRec(arr) { localStorage.setItem("WS_REC", JSON.stringify(arr)); }
        function addRec(rec) { const arr = getRec(); const idx = arr.findIndex(r => r.date === rec.date && r.siteName === rec.siteName); if (idx >= 0) arr[idx] = rec; else arr.push(rec); arr.sort((a, b) => a.date > b.date ? -1 : 1); saveRec(arr); }

        window.loadPastRec = function (u, sn, dateVal) {
            const today = new Date().toISOString().slice(0, 10);
            const modeEl = document.getElementById(`fmode_${u}`);
            const recs = getRec();
            const past = recs.find(r => r.date === dateVal && r.siteName === sn);

                ['fd1', 'fd2', 'fd3', 'fd4'].forEach((id, i) => { const el = document.getElementById(`${id}_${u}`); if (el) el.value = past[['DI_조식', 'DI_중식', 'DI_석식', 'DI_야식'][i]] || ''; });

                const fn2 = document.getElementById(`fn2_${u}`); if (fn2) fn2.value = past.기타특이사항 || '';

            } else {
                ['fd1', 'fd2', 'fd3', 'fd4', 'ft1', 'ft2', 'ft3', 'ft4', 'fsl', 'fmt'].forEach(id => { const el = document.getElementById(`${id}_${u}`); if (el) el.value = ''; });

            }
        };

        window.svRec = async function (u, sn, rg) {
            const p = {
                tk: TK,
                date: document.getElementById(`fd_${u}`).value, siteName: sn, region: rg,
                DI_조식: Number(document.getElementById(`fd1_${u}`).value || 0), DI_중식: Number(document.getElementById(`fd2_${u}`).value || 0),
                DI_석식: Number(document.getElementById(`fd3_${u}`).value || 0), DI_야식: Number(document.getElementById(`fd4_${u}`).value || 0),
                TO_조식: Number(document.getElementById(`ft1_${u}`).value || 0), TO_중식: Number(document.getElementById(`ft2_${u}`).value || 0),
                TO_석식: Number(document.getElementById(`ft3_${u}`).value || 0), TO_야식: Number(document.getElementById(`ft4_${u}`).value || 0),
                도전매출: Number(document.getElementById(`fsl_${u}`).value || 0), 재료비: Number(document.getElementById(`fmt_${u}`).value || 0),
                식사특이사항: document.getElementById(`fn1_${u}`).value || "", 기타특이사항: document.getElementById(`fn2_${u}`).value || ""
            };
            addRec(p);
            const btn = event.target, msg = document.getElementById(`fm_${u}`);
            btn.disabled = true; btn.innerText = "저장 중...";
            try {
                const r = await fetch(API, { method: "POST", body: JSON.stringify(p), redirect: "follow" });
                const t = await r.text();
                msg.style.color = t.includes("Success") ? "var(--success)" : "var(--danger)";
                msg.innerText = t.includes("Success") ? "✅ 저장 완료" : "❌ " + t;
            } catch (e) { msg.style.color = "var(--warning)"; msg.innerText = "⚠️ 서버 오류 (로컬 저장 완료)"; }
            finally { btn.disabled = false; btn.innerText = "💾 저장"; }
            const msgEl = document.getElementById(`fm_${u}`);
            if (msgEl && msgEl.innerText.startsWith("✅")) {
                setTimeout(() => {
                    ['fd1', 'fd2', 'fd3', 'fd4', 'ft1', 'ft2', 'ft3', 'ft4', 'fsl', 'fmt'].forEach(id => { const el = document.getElementById(`${id}_${u}`); if (el) el.value = ''; });

                    const modeEl = document.getElementById(`fmode_${u}`); if (modeEl) modeEl.textContent = '';
                    if (msgEl) msgEl.innerText = '';
                }, 2000);
            }
        };

        /* ===== 캘린더 ===== */

            const toX=i=>padL+(i/(intensities.length-1||1))*plotW,toY=v=>padT+(1-(v-minS)/(maxS-minS))*plotH;

            let svgHtml=`<div style="margin-bottom:16px;overflow-x:auto"><svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;min-width:${svgW}px;height:${svgH}px;display:block"><defs><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#38bdf8" stop-opacity=".25"/><stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/></linearGradient></defs><line x1="${padL}" y1="${y80}" x2="${svgW-padR}" y2="${y80}" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/><text x="${padL-4}" y="${y80+4}" font-size="8" fill="#fbbf24" text-anchor="end" opacity=".7">80</text><line x1="${padL}" y1="${y95}" x2="${svgW-padR}" y2="${y95}" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/><text x="${padL-4}" y="${y95+4}" font-size="8" fill="#f87171" text-anchor="end" opacity=".7">95</text><line x1="${padL}" y1="${padT+plotH}" x2="${svgW-padR}" y2="${padT+plotH}" stroke="rgba(148,163,184,.12)" stroke-width="1"/><polygon points="${intensities.map((x,i)=>`${toX(i)},${toY(x.it.s)}`).join(' ')} ${toX(intensities.length-1)},${padT+plotH} ${toX(0)},${padT+plotH}" fill="url(#ig)"/><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${intensities.map((x,i)=>{const lb=iLb(x.it.s),cx=toX(i),cy=toY(x.it.s),nameShort=x.name.length>4?x.name.slice(0,4)+'…':x.name;return`<circle cx="${cx}" cy="${cy}" r="5" fill="${lb.c}" stroke="var(--bg)" stroke-width="2"/><text x="${cx}" y="${cy-10}" font-size="10" font-weight="900" fill="${lb.c}" text-anchor="middle">${x.it.s.toFixed(0)}</text><text x="${cx}" y="${svgH-padB+14}" font-size="9" fill="var(--muted)" text-anchor="middle">${nameShort}</text>`;}).join('')}</svg></div>`;
            svgHtml+=`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">`;
            intensities.forEach(({name,it})=>{const lb=iLb(it.s);svgHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:rgba(0,0,0,.2);border-radius:8px"><span style="font-size:12px;font-weight:900">${name}</span><div style="display:flex;gap:10px;align-items:center;font-size:11px;color:var(--dim)"><span>투입 ${it.st}명</span><span>총 ${it.tm.toLocaleString()}식</span><span class="badge" style="color:${lb.c};background:${lb.b}">${lb.e} ${lb.t} <strong style="color:${lb.c}">${it.s.toFixed(1)}</strong></span></div></div>`;});
            svgHtml+='</div>'; h+=svgHtml;
            const mxL=Math.max(...fd.map(d=>n(d["DI_중식"])+n(d["TO_중식"])));
            h+=`<div class="sec-title">🏢 중식 비교 (D/I · T/O)</div>`;
            fd.forEach(d=>{const di=n(d["DI_중식"]),to=n(d["TO_중식"]),tot=di+to,pDI=mxL>0?(di/mxL*100):0,pTO=mxL>0?(to/mxL*100):0;h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:900;margin-bottom:4px"><span>${d["사업장명"]}</span><span style="color:var(--dim);font-weight:700">합계 ${f(tot)}</span></div><div class="ch-dual"><div class="ch-track"><div class="ch-fill" style="width:${pDI}%;background:linear-gradient(90deg,var(--accent),var(--accent2))">${f(di)}</div></div></div><div class="ch-dual"><div class="ch-track"><div class="ch-fill" style="width:${pTO}%;background:linear-gradient(90deg,var(--warning),#f59e0b)">${f(to)}</div></div></div><div style="display:flex;gap:12px;font-size:9px;color:var(--dim);margin-top:1px"><span>🔵 D/I</span><span>🟠 T/O</span></div></div>`;});
            h+=`<div class="sec-title">💡 운영 상황 진단 및 솔루션 가이드</div><div style="padding:14px;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.12);border-radius:12px;font-size:11px;line-height:1.7"><div style="margin-bottom:10px"><strong style="color:var(--warning)">CASE A. 회전율은 높으나 업무 강도 보통 (🟡/🟢)</strong><br>• <span style="color:var(--text)">진단:</span> 조리 인력은 적정하나 식당 공간/좌석이 부족한 상태입니다.<br>• <span style="color:var(--accent)">솔루션:</span> 인원 충원보다는 T/O(도시락 형태) 비율을 확대 권장합니다.</div><div style="margin-bottom:10px"><strong style="color:var(--danger)">CASE B. 회전율도 높고 업무 강도도 높음 (🔴)</strong><br>• <span style="color:var(--text)">진단:</span> 공간도 부족하고 주방 일손도 한계치에 도달한 위험 상태입니다.<br>• <span style="color:var(--accent)">솔루션:</span> 신규 인원 충원, 지원 인력 투입 또는 제공 품목수 축소가 시급합니다.</div></div>`;
            ct.innerHTML = h;
            document.getElementById("ov").style.display = "flex";
        };

        /* ===== 비밀번호 변경 ===== */
        window.openPwChange = function () {
            document.getElementById("pw-cur").value = "";
            document.getElementById("pw-new").value = "";
            document.getElementById("pw-confirm").value = "";
            document.getElementById("pw-msg").textContent = "";
            document.getElementById("pw-modal").style.display = "flex";
            setTimeout(() => document.getElementById("pw-cur").focus(), 100);
        };
        window.submitPwChange = async function () {
            const msg = document.getElementById("pw-msg");
            const cur = document.getElementById("pw-cur").value;
            const nw = document.getElementById("pw-new").value;
            const conf = document.getElementById("pw-confirm").value;
            if (!cur) { msg.style.color = "var(--danger)"; msg.textContent = "현재 비밀번호를 입력하세요."; return; }
            if (!nw || nw.length < 4) { msg.style.color = "var(--danger)"; msg.textContent = "새 비밀번호는 4자 이상이어야 합니다."; return; }
            if (nw !== conf) { msg.style.color = "var(--danger)"; msg.textContent = "새 비밀번호가 일치하지 않습니다."; return; }
            msg.style.color = "var(--dim)"; msg.textContent = "변경 중...";
            try {
                const r = await fetch(API, { method: "POST", redirect: "follow", body: JSON.stringify({ action: "changePw", userId: USER, currentPw: cur, newPw: nw }) });
                const d = await r.json();
                if (d.ok) { msg.style.color = "var(--success)"; msg.textContent = "✅ 비밀번호가 변경되었습니다!"; setTimeout(() => document.getElementById("pw-modal").style.display = "none", 1500); }
                else { const errMap = { wrong_current_pw: "현재 비밀번호가 올바르지 않습니다.", weak_new_pw: "새 비밀번호는 4자 이상이어야 합니다.", user_not_found: "계정을 찾을 수 없습니다." }; msg.style.color = "var(--danger)"; msg.textContent = errMap[d.error] || "오류: " + d.error; }
            } catch (e) { msg.style.color = "var(--warning)"; msg.textContent = "통신 오류: " + e.message; }
        };

        /* =====================================================
           ★ window.onload — v3.6 핵심 수정
              세션 재사용 시 sessionLog 호출로 GAS 로그 기록
        ===================================================== */
        window.onload = function () {
            /* 아이디 저장 복원 */
            try {
                const saved = localStorage.getItem("WS_ID");
                if (saved) {
                    document.getElementById("loginId").value = saved;
                    document.getElementById("loginId").closest('.login-field').style.opacity = '0.7';
                    document.getElementById("save-id-label").textContent = "저장됨 ✓";
                    document.getElementById("save-id-btn").textContent = "저장 해제";
                    document.getElementById("save-id-btn").style.color = "var(--accent)";
                    document.getElementById("save-id-btn").style.borderColor = "rgba(56,189,248,.3)";
                    document.getElementById("loginPw").focus();
                }
            } catch (e) { }

            /* 세션 재사용 로그인 */
            try {
                const s = sessionStorage.getItem("WS"), tk = sessionStorage.getItem("WTK");
                const role = sessionStorage.getItem("WR") || "C";
                const region = sessionStorage.getItem("WRG") || "";
                const site = sessionStorage.getItem("WST") || "";
                if (s) {
                    USER = s; TK = tk;
                    USER_ROLE = role; USER_REGION = region; USER_SITE = site;
                    document.getElementById("login-overlay").style.display = "none";
                    applyRoleUI();
                    init();
                    setTimeout(() => initSecurity(s), 500);

                    /* ★ v3.6 핵심: 세션 재사용 접속 로그를 GAS에 기록 */
                    if (tk) {
                        fetch(
                            API + "?type=sessionLog&tk=" + encodeURIComponent(tk) + "&userId=" + encodeURIComponent(s),
                            { redirect: "follow" }
                        ).catch(() => { /* 로그 전송 실패는 무시 */ });
                    }
                }
            } catch (e) { }
        };

        window.toggleSaveId = function () {
            try {
                const saved = localStorage.getItem("WS_ID"), btn = document.getElementById("save-id-btn"), lbl = document.getElementById("save-id-label"), idInput = document.getElementById("loginId");
                if (saved) { localStorage.removeItem("WS_ID"); idInput.value = ""; idInput.closest('.login-field').style.opacity = '1'; idInput.disabled = false; lbl.textContent = ""; btn.textContent = "아이디 저장"; btn.style.color = "var(--muted)"; btn.style.borderColor = "var(--border)"; idInput.focus(); }
                else { const id = idInput.value.trim(); if (!id) { idInput.focus(); return; } localStorage.setItem("WS_ID", id); lbl.textContent = "저장됨 ✓"; btn.textContent = "저장 해제"; btn.style.color = "var(--accent)"; btn.style.borderColor = "rgba(56,189,248,.3)"; idInput.closest('.login-field').style.opacity = '0.7'; document.getElementById("loginPw").focus(); }
            } catch (e) { const lbl = document.getElementById("save-id-label"); if (lbl) { lbl.textContent = "⚠️ 저장 불가"; setTimeout(() => { lbl.textContent = ""; }, 2000); } }
        };

        /* ===== 보안 모듈 ===== */
        function initSecurity(userId) { function buildWatermark(uid) { const cvs = document.createElement('canvas'); cvs.width = 340; cvs.height = 160; const ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, cvs.width, cvs.height); ctx.save(); ctx.translate(cvs.width / 2, cvs.height / 2); ctx.rotate(-Math.PI / 7); ctx.globalAlpha = 0.055; ctx.fillStyle = '#ffffff'; ctx.font = '700 15px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('Samsung Welstory', 0, -18); ctx.font = '600 13px Inter, sans-serif'; ctx.fillText(uid + '@samsung.com', 0, 4); ctx.font = '500 11px Inter, sans-serif'; ctx.fillText(new Date().toLocaleDateString('ko-KR'), 0, 22); ctx.restore(); return cvs.toDataURL('image/png'); } const wmDiv = document.createElement('div'); wmDiv.id = 'wm-overlay'; wmDiv.style.cssText = `position:fixed;inset:0;z-index:99998;pointer-events:none;user-select:none;background-image:url(${buildWatermark(userId)});background-repeat:repeat;background-size:340px 160px;opacity:1;`; document.body.appendChild(wmDiv); const blurShield = document.createElement('div'); blurShield.id = 'blur-shield'; blurShield.style.cssText = `display:none;position:fixed;inset:0;z-index:99997;background:rgba(10,15,30,0.97);backdrop-filter:blur(20px);justify-content:center;align-items:center;flex-direction:column;gap:12px;pointer-events:all;`; blurShield.innerHTML = `<div style="font-size:48px;">🔒</div><div style="color:#f1f5f9;font-size:18px;font-weight:900;letter-spacing:-.5px">화면 보호 중</div><div style="color:#64748b;font-size:13px;text-align:center;line-height:1.6">화면 공유 또는 캡처 감지됨<br/>이 창을 다시 클릭하면 해제됩니다</div>`; document.body.appendChild(blurShield); function showShield() { if (!secReady) return; blurShield.style.display = 'flex'; } function hideShield() { blurShield.style.display = 'none'; } blurShield.addEventListener('click', hideShield); var secReady = false; setTimeout(function () { secReady = true; }, 5000); document.addEventListener('visibilitychange', () => { if (document.hidden) showShield(); else setTimeout(hideShield, 1200); }); if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) { const origGDM = navigator.mediaDevices.getDisplayMedia.bind(navigator.mediaDevices); navigator.mediaDevices.getDisplayMedia = async function (...args) { showShield(); const stream = await origGDM(...args); stream.getTracks().forEach(t => t.addEventListener('ended', hideShield)); return stream; }; } document.addEventListener("keydown", e => { const k = e.key.toLowerCase(); if (e.key === 'PrintScreen') { e.preventDefault(); showShield(); setTimeout(hideShield, 2000); return; } if (e.key === 'F12') { e.preventDefault(); return; } if (e.ctrlKey || e.metaKey) { const blocked = ['c', 'a', 'u', 's', 'p', 'x', 'f', 'g', 'e', 'h', 'r', 'l', 'd', 'n', 't', 'w', 'j']; if (blocked.includes(k)) { e.preventDefault(); return; } if (e.shiftKey && ['i', 'j', 'c', 'k', 'm', 'p', 'e'].includes(k)) { e.preventDefault(); return; } } }, true); document.addEventListener("contextmenu", e => e.preventDefault(), true); document.addEventListener("dragstart", e => e.preventDefault(), true); document.addEventListener("selectstart", e => { if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) e.preventDefault(); }, true); const noSelectStyle = document.createElement('style'); noSelectStyle.textContent = `body,.card,.tbl-wrap,.stats-row,.staff-panel,header,main{-webkit-user-select:none!important;-moz-user-select:none!important;user-select:none!important;}input,textarea,select{-webkit-user-select:text!important;user-select:text!important;}`; document.head.appendChild(noSelectStyle); let devToolsOpen = false; setInterval(() => { const threshold = 160; if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) { if (!devToolsOpen) { devToolsOpen = true; showShield(); blurShield.innerHTML = `<div style="font-size:48px;">⚠️</div><div style="color:#f87171;font-size:18px;font-weight:900">개발자 도구 감지</div><div style="color:#64748b;font-size:13px;text-align:center;line-height:1.6">보안 정책에 의해 접근이 제한됩니다<br/><span id="dev-countdown" style="color:#fbbf24;font-weight:700">5초 후 로그아웃...</span></div>`; let countdown = 5; const timer = setInterval(() => { countdown--; const el = document.getElementById('dev-countdown'); if (el) el.textContent = `${countdown}초 후 로그아웃...`; if (countdown <= 0) { clearInterval(timer); sessionStorage.clear(); location.reload(); } }, 1000); } } else { devToolsOpen = false; } }, 1000); }
    </script>
</body>
